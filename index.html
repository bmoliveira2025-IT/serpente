<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <meta name="x5-orientation" content="landscape">
    <title>Serpente - O Conto do Rei</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Poppins', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
        }

        /* Estilo Vidro AAA */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
            pointer-events: auto;
        }

        /* HUD - PADRÃO PC (Rodapé Esquerdo) */
        #hud-status {
            position: absolute;
            bottom: 25px;
            left: 25px;
            display: none;
            flex-direction: column;
            gap: 5px;
            padding: 15px 30px;
            border-radius: 15px;
            z-index: 50;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .hud-stat {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-stat span {
            color: #ffdf00;
            font-size: 20px;
            font-weight: 800;
            text-shadow: 2px 2px 4px black;
            margin-left: 5px;
        }

        /* HUD - VERSÃO MOBILE (Centro inferior, ultra-compacto) */
        @media (max-width: 1024px) {
            #hud-status {
                bottom: 12px !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
                flex-direction: row !important;
                gap: 15px !important;
                padding: 6px 18px !important;
                border-radius: 50px !important;
                white-space: nowrap;
                background: rgba(0, 0, 0, 0.6) !important;
                border-color: rgba(255, 255, 255, 0.1) !important;
            }

            .hud-stat {
                font-size: 7px !important;
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .hud-stat span {
                font-size: 15px !important;
                margin-left: 0 !important;
            }
        }

        /* TOP 10 COMPACTO */
        #leaderboard {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 170px;
            padding: 10px;
            border-radius: 10px;
            display: none;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
        }

        #lb-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .lb-entry {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.6);
        }

        .lb-entry.is-me {
            color: #ffdf00 !important;
            font-weight: 800;
        }

        /* SKINS RODAPÉ DIREITO */
        #skins-btn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            z-index: 50;
        }

        #skins-btn:hover {
            transform: scale(1.1);
        }

        #skins-btn span {
            font-weight: 700;
            color: #ffdf00;
            font-size: 11px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px black;
        }

        @media (max-width: 1024px) {
            #skins-btn {
                bottom: 12px;
                right: 15px;
                transform: scale(0.75);
            }
        }

        #quality-btn {
            position: absolute;
            bottom: 25px;
            left: 25px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            z-index: 50;
        }

        #quality-btn:hover {
            transform: scale(1.1);
        }

        #quality-btn span {
            font-weight: 700;
            color: #ffdf00;
            font-size: 11px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px black;
        }

        @media (max-width: 1024px) {
            #quality-btn {
                bottom: 12px;
                left: 15px;
                transform: scale(0.75);
            }
        }

        #start-menu,
        #death-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(5, 5, 5, 0.8) 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
        }

        #death-screen h2 {
            color: #ffdf00 !important;
            font-size: clamp(35px, 8vw, 70px);
            font-weight: 800;
            text-shadow: 0 0 30px rgba(255, 223, 0, 0.4);
            text-transform: uppercase;
        }

        .logo-container {
            font-size: clamp(45px, 12vw, 100px);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .slither-text {
            color: #ffdf00;
            animation: goldenShine 5s linear infinite;
        }

        @keyframes goldenShine {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.3) drop-shadow(0 0 20px #ffdf00);
            }
        }

        .crown-icon {
            display: inline-block;
            animation: floatCrown 3.5s ease-in-out infinite;
            filter: drop-shadow(0 5px 15px rgba(255, 223, 0, 0.3));
        }

        @keyframes floatCrown {

            0%,
            100% {
                transform: translateY(0) rotate(-8deg) scale(1.0);
            }

            50% {
                transform: translateY(-12px) rotate(8deg) scale(1.1);
            }
        }

        .subtitle {
            margin-top: 5px;
            font-size: clamp(10px, 3vw, 14px);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 700;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 223, 0, 0.9) 50%, rgba(255, 255, 255, 0.4) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            text-align: center;
        }

        .input-group {
            width: 90%;
            max-width: 320px;
            margin-bottom: 25px;
            position: relative;
        }

        #nickname {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50px;
            padding: 16px 30px;
            border: 2px solid rgba(255, 223, 0, 0.15);
            color: white;
            text-align: center;
            outline: none;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        #nickname:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 223, 0, 0.8);
            box-shadow: 0 0 25px rgba(255, 223, 0, 0.3);
            transform: scale(1.05);
        }

        #nickname::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
        }

        .btn-aaa {
            padding: 18px 70px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 50px;
            border: none;
            background: linear-gradient(145deg, #ffdf00 0%, #ccaa00 100%);
            color: #000;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        .btn-aaa:hover {
            transform: scale(1.05);
        }

        #minimap-wrapper {
            position: absolute;
            top: 15px;
            left: 15px;
            display: none;
            z-index: 60;
        }

        #minimap-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.5);
        }

        #mobile-controls {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
        }

        #joystick-base {
            position: absolute;
            bottom: 25px;
            left: 25px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(2px);
            pointer-events: auto;
            z-index: 1000;
            transition: opacity 0.2s;
            opacity: 0.8;
        }

        #joystick-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%);
        }

        #mobile-boost-btn {
            position: absolute;
            bottom: 35px;
            right: 25px;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(255, 223, 0, 0.05);
            border: 1px solid rgba(255, 223, 0, 0.3);
            color: rgba(255, 223, 0, 0.6);
            font-size: 11px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            pointer-events: auto;
            z-index: 1000;
            backdrop-filter: blur(2px);
            transition: opacity 0.2s;
            opacity: 0.8;
        }

        #joystick-base:active,
        #mobile-boost-btn:active {
            opacity: 1;
        }

        #skin-preview-ui {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
        }

        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 105;
        }

        #orientation-overlay {
            position: fixed;
            inset: 0;
            background: #050505;
            color: white;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud-status" class="glass-panel">
            <div class="hud-stat">ABUNDÂNCIA <span id="score-display">0</span></div>
            <div class="hud-stat">RANK <span id="rank-display">0</span> / <span id="total-display">0</span></div>
        </div>

        <div id="leaderboard" class="glass-panel">
            <div id="lb-list"></div>
        </div>
        <div id="minimap-wrapper">
            <div id="minimap-container" class="glass-panel"><canvas id="minimap"></canvas></div>
        </div>

        <div id="mobile-controls">
            <div id="joystick-base">
                <div id="joystick-handle"></div>
            </div>
            <div id="mobile-boost-btn">TURBO</div>
        </div>

        <!-- MODAL ADMIN -->
        <div id="admin-panel" class="hidden" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(10,12,16,0.98); border:1px solid #00ffff; border-radius:16px; padding:25px; box-shadow:0 0 50px rgba(0,255,255,0.4); z-index:10000; max-width:95%; width:500px; height:80vh; display:flex; flex-direction:column; pointer-events:all;">
            <div style="text-align:center; font-family:'Outfit', sans-serif; flex-shrink:0;">
                <div style="font-size:2rem; filter:drop-shadow(0 0 10px #ff0055);">⚙️ OCI NUVEM</div>
                <div style="color:#ff0055; font-weight:bold; margin-bottom:15px;">Acesso Restrito às Físicas</div>
            </div>
            
            <div id="admin-fields" style="flex-grow:1; overflow-y:auto; overflow-x:hidden; padding-right:10px; display:flex; flex-direction:column; gap:8px; font-family:'Inter', sans-serif; text-align:left; scrollbar-width:thin; scrollbar-color:#00ffff rgba(255,255,255,0.1);">
                <div style="color:gray; font-size:12px; text-align:center;">A Ligar à Máquina...</div>
            </div>

            <div style="flex-shrink:0; margin-top:20px;">
                <button id="btn-save-admin" class="btn-aaa" style="padding:15px; background:linear-gradient(135deg, #ff0055, #aa00ff);">APLICAR NA NUVEM</button>
                <button id="btn-close-admin" class="btn-aaa" style="margin-top:10px; padding:15px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); box-shadow:none;">SAIR DO COFRE</button>
            </div>
        </div>

        <div id="start-menu">
            <div id="btn-open-admin" style="position:absolute; right:20px; top:20px; font-size:24px; cursor:pointer; opacity:0.1; transition:0.3s;" title="Administração OCI">⚙️</div>
            <div class="logo-container">
                <div class="crown-icon">👑</div><span class="slither-text">Serpente</span>
            </div>
            <div class="subtitle">O CONTO DA COROA DOURADA</div>

            <div class="input-group">
                <input type="text" id="nickname" placeholder="NOME DA LENDA" maxlength="16" autocomplete="off">
            </div>
            <button id="play-btn" class="btn-aaa">INICIAR JORNADA</button>
            <div id="skins-btn">
                <div style="font-size:30px; margin-bottom:5px;">🐍</div><span>MUDAR ESCAMAS</span>
            </div>
            <div id="quality-btn">
                <div style="font-size:30px; margin-bottom:5px;">⚙️</div><span>QUALIDADE: <span id="quality-val"
                        style="color:#00ff88; text-shadow:none;">ALTA</span></span>
            </div>
        </div>

        <div id="skin-preview-ui" class="hidden">
            <div id="skin-name-display"
                style="position:absolute; top:12%; left:50%; transform:translateX(-50%); color:#ffdf00; font-weight:800; font-size:30px;">
                PELE ORIGINAL</div>
            <div id="left-arrow" class="arrow-btn" style="left:8%;"><svg width="80" height="80" viewBox="0 0 24 24"
                    fill="#ffdf00">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                </svg></div>
            <div id="right-arrow" class="arrow-btn" style="right:8%;"><svg width="80" height="80" viewBox="0 0 24 24"
                    fill="#ffdf00">
                    <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                </svg></div>
            <button id="skin-ok-btn" class="btn-aaa"
                style="background: #ffdf00; color: #000; position:absolute; bottom:15%; left:50%; transform:translateX(-50%); z-index: 110;">OK</button>
        </div>

        <div id="death-screen" class="hidden">
            <h2>A LENDA TERMINOU</h2>
            <div class="glass-panel"
                style="padding: 30px 60px; border-radius: 30px; margin-bottom: 30px; text-align: center; border-color:#ffdf00; background:rgba(0,0,0,0.8);">
                <p
                    style="margin: 0; color: rgba(255,255,255,0.4); font-weight: 600; font-size:12px; letter-spacing:2px;">
                    ABUNDÂNCIA RECOLHIDA</p>
                <div id="death-length"
                    style="font-size: 60px; font-weight: 800; color: #ffdf00; text-shadow: 0 0 20px rgba(255,223,0,0.5);">
                    0</div>
                <p style="margin-top:10px; font-weight:600; color:rgba(255,255,255,0.8);">INIMIGOS VENCIDOS: <span
                        id="death-kills" style="color:#ffdf00">0</span></p>
            </div>
            <button id="play-again-btn" class="btn-aaa">RECOMEÇAR</button>
        </div>

        <div id="orientation-overlay">
            <div style="font-size: 50px;">📱</div>
            <h2>RODE O APARELHO</h2>
            <p>Jogue em modo horizontal.</p>
        </div>
    </div>

    <script>
        /**
         * =========================================================================================
         * ⚙️ PAINEL DE CONFIGURAÇÕES (MODO FÁCIL PARA EDIÇÃO)
         * Altere os valores abaixo para modificar o comportamento do jogo no PC e Mobile.
         * =========================================================================================
         */
        const IS_MOBILE_CLIENT = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 1024;

        const CONFIG = {
            // 🐍 1. CONFIGURAÇÕES DA SERPENTE
            cobra: {
                pc: {
                    espessuraInicial: 18,       // Grossura da cobra ao nascer (PC)
                    espessuraMaxima: 30,        // Limite máximo de grossura (PC)
                    comprimentoMaximo: 400,     // Limite máximo de gomos do corpo (PC)
                    velocidadeBase: 7.5,        // Velocidade normal ao andar (PC)
                    velocidadeTurbo: 8.0       // Velocidade máxima ao pressionar o clique do rato (PC)
                },
                mobile: {
                    espessuraInicial: 10,       // Grossura da cobra ao nascer (Mobile)
                    espessuraMaxima: 18,        // Limite máximo de grossura (Mobile)
                    comprimentoMaximo: 350,     // Limite máximo de gomos do corpo (Mobile)
                    velocidadeBase: 3.0,        // Velocidade normal ao andar (Mobile)
                    velocidadeTurbo: 8.5        // Velocidade máxima ao usar o botão Turbo (Mobile)
                },
                // Comum a ambos os dispositivos:
                comprimentoInicial: 25,         // Quantos gomos (pontos) a cobra tem ao começar o jogo
                distanciaGomos: 0.22,           // Espaço/sobreposição entre cada gomo do corpo (0 a 1)
                pontosParaEngrossar: 130,       // Abundância necessária para alargar a cobra em 1 pixel
                pontosParaCrescer: 6,          // Abundância necessária para ganhar 1 gomo extra
                custoDoTurbo: 2.5               // Quantidade de pontos perdidos por instante ao usar o turbo
            },

            // 🔍 2. CONFIGURAÇÕES DE CÂMARA E ZOOM
            zoom: {
                pc: {
                    inicial: 1.30,              // Zoom inicial (PC) - Valores maiores aproximam mais
                    minimo: 0.75,               // Distância máxima que a câmara afasta quando se fica gigante (PC)
                    fatorAfastamento: 0.015     // O quão rápido a câmara recua conforme se ganha pontos (PC)
                },
                mobile: {
                    inicial: 0.90,              // Zoom inicial (Mobile) - Começa mais afastado para ver mais área
                    minimo: 0.60,               // Distância máxima de afastamento (Mobile)
                    fatorAfastamento: 0.010     // O quão rápido a câmara recua (Mobile)
                }
            },

            // 🌍 3. CONFIGURAÇÕES DO MAPA E UNIVERSO
            mundo: {
                tamanhoRaio: 8000,              // Tamanho total da arena circular (A fronteira de Rubi)
                quantidadeBots: {
                    pc: 400,                     // Quantos inimigos de IA andam pelo mapa simultaneamente (PC)
                    mobile: 150                  // Quantos inimigos de IA andam pelo mapa simultaneamente (Mobile)
                },
                quantidadeComida: 15000,         // Número máximo de orbs de comida espalhados pelo chão
                tamanhoComidaMin: 5.0,          // Tamanho mínimo que uma orb pode ter
                tamanhoComidaMax: 9.5,          // Tamanho máximo que uma orb pode ter
                forcaAtracao: 40,               // Força do íman (Raio em pixeis que "suga" a comida para a cobra)
                corGrade: 'rgba(255,255,255,0.03)', // Cor das linhas do mosaico hexagonal (Branco quase invisível)
                corFundo: '#050505',            // Cor do fundo escuro do mapa (Preto AAA)
                tamanhoHexagono: {
                    pc: 35,                     // Escala da célula do mosaico (PC)
                    mobile: 10                  // Escala da célula do mosaico (Mobile)
                }
            },

            // ✨ 4. CONFIGURAÇÕES VISUAIS E EFEITOS AMBIENTAIS
            visual: {
                balancoComida: 4.8,             // Efeito de tremor/vibração flutuante das orbs no mapa
                velocidadeAnimacaoComida: 0.002,// Velocidade com que as orbs vibram
                quantidadeVagalumes: 100,       // Número de luzes brancas flutuantes na arena
                distanciaFugaVagalumes: 180     // Distância a que o vagalume sente o perigo de uma cobra e foge
            }
        };

        /**
         * =========================================================================================
         * FIM DAS CONFIGURAÇÕES (Abaixo está o Motor de Jogo - Não alterar sem conhecimento técnico)
         * =========================================================================================
         */

        const WORLD_CENTER = CONFIG.mundo.tamanhoRaio;
        const BOT_NAMES = [
            "Helena", "Jorge", "Príncipe", "Vila", "Milagre", "Sombra", "Veloz", "Mago", "Rei", "Guardião",
            "Fantasma", "Lenda", "Titã", "Colosso", "Víbora", "Devorador", "Espectro", "Caçador", "Fera",
            "Bolsonaro", "Lulaladrão", "Neymar", "Cristiano", "Messi", "Elon Musk", "Zuckerberg", "Silvio Santos",
            "Faustão", "Gugu", "Pelé", "Maradona", "Ronaldinho", "Ronaldo", "Rivaldo", "Gita", "Lucas", "Miguel",
            "Arthur", "Gabriel", "Heitor", "Davi", "Bernardo", "Samuel", "João", "Pedro", "Alice", "Laura",
            "Maria", "Sophia", "Júlia", "Luísa", "Valentina", "Isabella", "Heloísa", "Manuela", "Vitória",
            "Rafael", "Matheus", "Enzo", "Nicolas", "Gustavo", "Guilherme", "Felipe", "Antônio", "Carlos",
            "Ricardo", "Paulo", "Fernando", "Roberto", "Marcos", "Francisco", "Afonso", "Tiago", "Diogo",

        function drawStandardEyes(ctx, x, y, radius, angle, lookAngle, skinId) {

        class Particle {
            constructor(x, y, color, s) { this.x = x; this.y = y; this.color = color; let a = Math.random() * Math.PI * 2; this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s; this.life = 1.0; this.decay = 0.02 + Math.random() * 0.02; this.size = 2 + Math.random() * 3; }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw(ctx) { ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; }
        }

        class Food {
            constructor(x, y, r, c, isD = false, eV = 2) { this.x = x; this.y = y; this.radius = r; this.color = c; this.isDropped = isD; this.value = eV; this.wO = Math.random() * Math.PI * 2; }

                let dy = this.y + Math.sin(time * CONFIG.visual.velocidadeAnimacaoComida + this.wO) * CONFIG.visual.balancoComida;
                let img = this.isDropped ? TextureManager.getDroppedFood(this.color) : TextureManager.getFood(this.color);
                ctx.drawImage(img, dx - this.radius, dy - this.radius, this.radius * 2, this.radius * 2);
            }
        }

        // --- OBJECT POOLING OTIMIZADO ---
        const foodPool = [];
        function getFoodObj(x, y, r, c, isD = false, eV = 2) {
            let f = foodPool.length > 0 ? foodPool.pop() : new Food(0, 0, 0, '', false, 0);
            f.x = x; f.y = y; f.radius = r; f.color = c; f.isDropped = isD; f.value = eV; f.wO = Math.random() * Math.PI * 2;
            return f;
        }

        function removeFood(index) {
            foodPool.push(foods[index]);
            // O(1) Array Removal (Swap-and-Pop) para performance sem Re-indexing
            foods[index] = foods[foods.length - 1];

        class Firefly {
            constructor() {
                let r = Math.sqrt(Math.random()) * WORLD_CENTER, t = Math.random() * 2 * Math.PI;
                this.x = WORLD_CENTER + r * Math.cos(t); this.y = WORLD_CENTER + r * Math.sin(t);
                this.radius = 3 + Math.random() * 3; this.angle = Math.random() * Math.PI * 2;
                this.speed = 1.0; this.color = '#fff';
                this.offset = Math.random() * 100;
            }
            update() {
                let dX = 0, dY = 0, count = 0;
                for (let s of snakes) {
                    if (!s.alive) continue;
                    let d = Math.hypot(s.x - this.x, s.y - this.y);
                    if (d < CONFIG.visual.distanciaFugaVagalumes) { dX += s.x; dY += s.y; count++; }
                }
                if (count > 0) {
                    let away = Math.atan2(this.y - (dY / count), this.x - (dX / count));
                    let diff = away - this.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;
                    this.angle += diff * 0.15; this.speed = 4.5;
                } else { this.angle += (Math.random() - 0.5) * 0.1; this.speed = 1.2; }
                this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed;
                if (Math.hypot(this.x - WORLD_CENTER, this.y - WORLD_CENTER) > WORLD_CENTER) this.angle = Math.atan2(WORLD_CENTER - this.y, WORLD_CENTER - this.x);
            }
            draw(ctx, time) {
                let p = Math.sin(time * 0.003 + this.offset), cR = Math.max(1, this.radius + p);
                ctx.beginPath(); ctx.arc(this.x, this.y, cR * 4, 0, Math.PI * 2);
                let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, cR * 4);
                g.addColorStop(0, 'rgba(255,255,255,0.4)'); g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g; ctx.fill();
            }
        }

        class Snake {
            constructor(x, y, n, sI, isP = false, startScore = 40) {
                this.x = x; this.y = y; this.name = n; this.skinId = sI; this.skin = SKINS[sI]; this.mainColor = this.skin[0]; this.isPlayer = isP; this.alive = true;
                this.angle = Math.random() * Math.PI * 2; this.targetAngle = this.angle; this.conf = IS_MOBILE_CLIENT ? CONFIG.cobra.mobile : CONFIG.cobra.pc;
                this.speed = this.conf.velocidadeBase; this.isBoosting = false; this.score = startScore;
                this.radius = Math.min(this.conf.espessuraInicial + Math.floor(this.score / CONFIG.cobra.pontosParaEngrossar), this.conf.espessuraMaxima);
                this.targetLength = Math.min(CONFIG.cobra.comprimentoInicial + Math.floor(this.score / CONFIG.cobra.pontosParaCrescer), this.conf.comprimentoMaximo);
                this.segments = [];
                for (let i = 0; i < this.targetLength; i++) this.segments.push({ x: x, y: y });
            }

            updateFromServer(serverData) {
                if (!this.alive) return;

                // Em vez de teletransportar a cobra duramente (Tick de 20hz), 
                // Guardamos as Coordenadas-Alvo para animá-las aos poucos no ecrã (60hz V-Sync)
                this.serverX = serverData.x;
                this.serverY = serverData.y;

                // Previne voltas completas invulgares
                let diff = serverData.a - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.serverAngle = this.angle + diff;

                this.score = serverData.s;

                // Se estiver muito longe do alvo (ex: Spawn inicial), teleporta-se imediatamente
                if (Math.hypot(this.serverX - this.x, this.serverY - this.y) > 200) {
                    this.x = this.serverX;
                    this.y = this.serverY;
                }

                this.radius = Math.min(this.conf.espessuraInicial + Math.floor(this.score / CONFIG.cobra.pontosParaEngrossar), this.conf.espessuraMaxima);
                this.targetLength = Math.min(CONFIG.cobra.comprimentoInicial + Math.floor(this.score / CONFIG.cobra.pontosParaCrescer), this.conf.comprimentoMaximo);
                if (this.segments.length < this.targetLength) this.segments.push({ x: this.segments[this.segments.length - 1].x, y: this.segments[this.segments.length - 1].y });
            }

            lerpUpdate() {
                if (!this.alive) return;

                // LERP: Move o visual 30% da distância rumo ao verdadeiro valor da nuvem todos os frames
                if (this.serverX !== undefined && this.serverY !== undefined) {
                    this.x += (this.serverX - this.x) * 0.25;
                    this.y += (this.serverY - this.y) * 0.25;
                    this.angle += (this.serverAngle - this.angle) * 0.25;
                }

                // Efeito Cinético (Anima os gomos rastejando mecanicamente pelo chão seguindo a cabeça)
                let pX = this.x, pY = this.y, spc = this.radius * CONFIG.cobra.distanciaGomos;
                for (let i = 0; i < this.segments.length; i++) {
                    let s = this.segments[i], dx = pX - s.x, dy = pY - s.y, d = Math.sqrt(dx * dx + dy * dy);
                    if (d > spc) { let mv = d - spc; s.x += (dx / d) * mv; s.y += (dy / d) * mv; }
                    pX = s.x; pY = s.y;
                }
            }
            draw(ctx) {
                if (!this.alive) return;

                // AAA Optimization: Distance-based LOD (Level Of Detail)
                let distToCam = Math.hypot(this.x - camera.x, this.y - camera.y);

                if (distToCam > 2800) {
                    // LOD Muito Baixo (Billboard): Apenas um círculo indicativo para evitar centenas de Draw Calls
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = this.mainColor;
                    ctx.fill();
                    return;
                }
                else if (distToCam > 1400) {
                    // LOD Intermédio: Culling de detalhe desnecessário, desenha 1 em cada 3/4 gomos
                    let step = Math.min(this.segments.length, 3);
                    for (let i = this.segments.length - 1; i >= 0; i -= step)
                        ctx.drawImage(TextureManager.getSegment(this.skin[i % this.skin.length]), this.segments[i].x - this.radius, this.segments[i].y - this.radius, this.radius * 2, this.radius * 2);
                    ctx.drawImage(TextureManager.getSegment(this.skin[0]), this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                }
                else {
                    // LOD Max (Alta Fidelidade Gráfica AAA): 100% dos gomos + Sombras + Olhos Dinâmicos
                    for (let i = this.segments.length - 1; i >= 0; i--)
                        ctx.drawImage(TextureManager.getSegment(this.skin[i % this.skin.length]), this.segments[i].x - this.radius, this.segments[i].y - this.radius, this.radius * 2, this.radius * 2);

                    ctx.drawImage(TextureManager.getSegment(this.skin[0]), this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                    let look = (joystickActive && this.isPlayer) ? joystickAngle : this.angle;
                    drawStandardEyes(ctx, this.x, this.y, this.radius, this.angle, look, this.skinId);
                }
            }
        }

        }

        function drawGrid(ctx, camX, camY, zoom) {
            ctx.fillStyle = CONFIG.mundo.corFundo; ctx.fillRect(camX - (window.innerWidth / zoom) / 2, camY - (window.innerHeight / zoom) / 2, window.innerWidth / zoom, window.innerHeight / zoom);
            if (isHighQuality) {
                let grad = ctx.createRadialGradient(WORLD_CENTER, WORLD_CENTER, 0, WORLD_CENTER, WORLD_CENTER, WORLD_CENTER);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.05)'); grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, WORLD_CENTER * 2, WORLD_CENTER * 2);
            }

            const size = IS_MOBILE_CLIENT ? CONFIG.mundo.tamanhoHexagono.mobile : CONFIG.mundo.tamanhoHexagono.pc; const h = size * Math.sqrt(3); const w = size * 1.5;
            let sC = Math.floor((camX - (window.innerWidth / zoom) / 2) / w) - 1; let eC = Math.ceil((camX + (window.innerWidth / zoom) / 2) / w) + 1;
            let sR = Math.floor((camY - (window.innerHeight / zoom) / 2) / h) - 1; let eR = Math.ceil((camY + (window.innerHeight / zoom) / 2) / h) + 1;

            ctx.beginPath(); ctx.strokeStyle = CONFIG.mundo.corGrade; ctx.lineWidth = 1;
            for (let c = sC; c <= eC; c++) {
                for (let r = sR; r <= eR; r++) {
                    let x = c * w, y = r * h + (c % 2 ? h / 2 : 0);
                    ctx.moveTo(x + size, y); for (let i = 1; i <= 6; i++) ctx.lineTo(x + size * Math.cos(i * Math.PI / 3), y + size * Math.sin(i * Math.PI / 3));
                }
            }
            ctx.stroke();
            ctx.beginPath(); ctx.arc(WORLD_CENTER, WORLD_CENTER, WORLD_CENTER, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(255, 0, 0, 0.15)'; ctx.lineWidth = 30; ctx.stroke();
        }

                mainCtx.fillStyle = CONFIG.mundo.corFundo; mainCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);
                if (isHighQuality) {
                    for (let ff of fireflies) { ff.update(); ff.draw(mainCtx, time); }
                    let grad = mainCtx.createRadialGradient(window.innerWidth / 2, window.innerHeight / 2, 0, window.innerWidth / 2, window.innerHeight / 2, window.innerWidth);
                    grad.addColorStop(0, 'rgba(255,255,255,0.05)'); grad.addColorStop(1, 'rgba(0,0,0,0.9)');
                    mainCtx.fillStyle = grad; mainCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);
                }
            }
            else if (gameState === 'skin-menu') {
                mainCtx.fillStyle = CONFIG.mundo.corFundo; mainCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);
                let act = SKINS[skinIndex], rad = IS_MOBILE_CLIENT ? 26 : 32, len = 60, segs = [], spc = rad * 0.45;
                let headX = window.innerWidth / 2 + (len * spc) / 2, centerY = window.innerHeight / 2;
                for (let i = 0; i < len; i++) segs.push({ x: headX - (i * spc), y: centerY + Math.sin(time * 0.005 - i * 0.15) * 40 });
                for (let i = segs.length - 1; i >= 0; i--) mainCtx.drawImage(TextureManager.getSegment(act[i % act.length]), segs[i].x - rad, segs[i].y - rad, rad * 2, rad * 2);
                let h = segs[0]; mainCtx.drawImage(TextureManager.getSegment(act[0]), h.x - rad, h.y - rad, rad * 2, rad * 2);
                drawStandardEyes(mainCtx, h.x, h.y, rad, 0, 0, skinIndex);
            }
            else if (gameState === 'playing' || gameState === 'dead') {
                // Multiplayer MMO Engine: No local Bot/Food Spawning or Collision Physics O(N^2)

                // Em vez disso, envia inputs crus do jogador para a Nuvem
                if (player && player.alive) {
                    if (joystickActive) player.targetAngle = joystickAngle;
                    else if (!IS_MOBILE_CLIENT) player.targetAngle = Math.atan2((mouseY - window.innerHeight / 2) / camera.zoom, (mouseX - window.innerWidth / 2) / camera.zoom);

                    if (typeof socket !== 'undefined' && socket) {
                        socket.emit('input', { angle: player.targetAngle, isBoosting: isMouseDown || player.isBoosting });
                    }
                }
                if (player && player.alive) {
                    camera.x += (player.x - camera.x) * 0.1; camera.y += (player.y - camera.y) * 0.1;
                    let zV = CONFIG.zoom[IS_MOBILE_CLIENT ? 'mobile' : 'pc'];
                    camera.zoom += (Math.max(zV.minimo, zV.inicial - Math.pow(player.score, 0.4) * zV.fatorAfastamento) * (player.isBoosting ? 0.94 : 1) - camera.zoom) * 0.05;
                }
                snakes = snakes.filter(s => s.alive || s.isPlayer);
                for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].life <= 0) particles.splice(i, 1); }
                for (let ff of fireflies) ff.update();
                mainCtx.save(); mainCtx.translate(window.innerWidth / 2, window.innerHeight / 2);
                if (camera.shake > 0.5) { mainCtx.translate(Math.random() * camera.shake - camera.shake / 2, Math.random() * camera.shake - camera.shake / 2); camera.shake *= 0.85; }
                mainCtx.scale(camera.zoom, camera.zoom); mainCtx.translate(-camera.x, -camera.y);
                drawGrid(mainCtx, camera.x, camera.y, camera.zoom);
                const pad = IS_MOBILE_CLIENT ? 50 : 200;
                const vw2 = (window.innerWidth / camera.zoom) / 2 + pad;
                const vh2 = (window.innerHeight / camera.zoom) / 2 + pad;
                const camX = camera.x; const camY = camera.y;

                if (isHighQuality) {
                    for (let ff of fireflies) { if (Math.abs(ff.x - camX) < vw2 && Math.abs(ff.y - camY) < vh2) ff.draw(mainCtx, time); }
                    for (let p of particles) { if (Math.abs(p.x - camX) < vw2 && Math.abs(p.y - camY) < vh2) p.draw(mainCtx); }
                }
                for (let f of foods) { if (Math.abs(f.x - camX) < vw2 && Math.abs(f.y - camY) < vh2) f.draw(mainCtx, time); }
                let dL = [...snakes].sort((a, b) => a.score - b.score);
                for (let s of dL) {
                    s.lerpUpdate();
                    let sReach = s.radius * CONFIG.cobra.distanciaGomos * s.segments.length + s.radius;
                    if (Math.abs(s.x - camX) < vw2 + sReach && Math.abs(s.y - camY) < vh2 + sReach) s.draw(mainCtx);
                }
                mainCtx.restore();
                if (frameCount % 10 === 0) updateHUD(); frameCount++;
            }
            requestAnimationFrame(gameLoop);
        }

        let socketGlob = null;
        if (typeof io !== 'undefined') {
            socketGlob = io();

            socketGlob.on('match_found', (data) => {
                myPlayerId = data.playerState.id;
                console.log("Conectado ao Motor da Nuvem! Arena:", data.arenaId);

                player = new Snake(data.playerState.x, data.playerState.y, UI.nick.value.trim() || "LENDA", skinIndex, true, data.playerState.score);
                player.id = myPlayerId;
                snakes = [player];

                gameState = 'playing'; UI.start.style.display = 'none'; UI.death.classList.add('hidden');
                UI.lb.style.display = 'block'; UI.status.style.display = 'flex'; UI.mini.style.display = 'block';
                if (IS_MOBILE_CLIENT) UI.ctrls.style.display = 'block';
            });

            socketGlob.on('init_foods', (serverFoods) => {
                // Instancia as comidas iniciais providenciadas pelo servidor
                foods = [];
                for (let f of serverFoods) {
                    let cF = getFoodObj(f.x, f.y, f.radius, PALETTE_COLORS[Math.floor(Math.random() * PALETTE_COLORS.length)], false, f.value);
                    cF.id = f.id; // Precisa do ID da nuvem para o Culling
                    foods.push(cF);
                }
                console.log(`[Culling] Carregadas ${foods.length} Orbs Mestre.`);
            });

            socketGlob.on('tick', (snapshot) => {
                if (gameState !== 'playing') return;

                // Mapear Snakes Atuais
                let activeIds = new Set();

                // 1. Atualiza Snakes
                for (let s of snapshot.p) {
                    activeIds.add(s.id);
                    let existing = snakes.find(sn => sn.id === s.id);

                    if (existing) {
                        existing.updateFromServer(s);
                    } else {
                        // Novo jogador/bot descoberto na nuvem
                        let nS = new Snake(s.x, s.y, "Inimigo", Math.floor(Math.random() * SKINS.length), false, s.score);
                        nS.id = s.id;
                        snakes.push(nS);
                    }
                }

                // Culling de cobras que morreram no servidor
                snakes = snakes.filter(s => activeIds.has(s.id));

                // 2. Atualiza Culling Diferencial das Orbs (Banda Larga Ultra-Leve)
                if (snapshot.fE && snapshot.fE.length > 0) {
                    // Remove as comidas comidas
                    let eatenSet = new Set(snapshot.fE);
                    for (let i = foods.length - 1; i >= 0; i--) {
                        if (eatenSet.has(foods[i].id)) removeFood(i);
                    }
                }

                if (snapshot.fN && snapshot.fN.length > 0) {
                    // Adiciona as novas comidas spawnadas
                    for (let f of snapshot.fN) {
                        let cF = getFoodObj(f.x, f.y, f.radius, PALETTE_COLORS[Math.floor(Math.random() * PALETTE_COLORS.length)], false, f.value);
                        cF.id = f.id;
                        foods.push(cF);
                    }
                }
            });

            // Sync Inputs
            setInterval(() => {
                if (player && player.alive && gameState === 'playing') {
                    socketGlob.emit('input', { angle: player.targetAngle, isBoosting: isMouseDown || player.isBoosting });
                }
            }, 50); // Manda o input 20x por segundo independentemente da renderização visual
        }

        // Listeners Locais
        let myPlayerId = null;
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mousedown', (e) => { if (e.button === 0) isMouseDown = true; });
        window.addEventListener('mouseup', (e) => { if (e.button === 0) isMouseDown = false; });

        async function startGame() {
            await enterFullscreen();
            snakes = []; foods = []; fireflies = []; particles = []; playerKills = 0;

            // Avisa o servidor que queremos jogar (O motor fará Matchmaking)
            if (socketGlob) {
                socketGlob.emit('join', { name: UI.nick.value.trim() || 'LENDA', skinId: skinIndex, isMobile: IS_MOBILE_CLIENT });
            } else {
                alert("Servidor Multiplayer Inacessível.");
            }

            for (let i = 0; i < CONFIG.visual.quantidadeVagalumes; i++) fireflies.push(new Firefly());
        }

        // --- ADMIN PANEL LOGIC ---
        const btnOpenAdmin = document.getElementById('btn-open-admin');
        const btnCloseAdmin = document.getElementById('btn-close-admin');
        const btnSaveAdmin = document.getElementById('btn-save-admin');
        const adminPanel = document.getElementById('admin-panel');
        const adminFields = document.getElementById('admin-fields');
        let currentAdminConfig = null;

        btnOpenAdmin.addEventListener('click', () => {
            if (socketGlob) {
                socketGlob.emit('admin_get_config');
                adminPanel.classList.remove('hidden');
                UI.start.classList.add('hidden');
            } else {
                alert("Ligue o servidor primeiro! (Socket offline)");
            }
        });

        btnCloseAdmin.addEventListener('click', () => {
            adminPanel.classList.add('hidden');
            UI.start.classList.remove('hidden');
        });

        function buildAdminInputs(obj, parentKey = '', container) {
            // Ordem garantida para facilitar encontrar campos
            let keys = Object.keys(obj).sort();
            for (let key of keys) {
                let deepKey = parentKey ? parentKey + '.' + key : key;
                if (typeof obj[key] === 'object' && obj[key] !== null) {
                    let sectionTitle = document.createElement('div');
                    sectionTitle.innerHTML = `<br><span style="color:#00ffff; font-weight:bold; font-size:14px; text-transform:uppercase;">[Grupo: ${deepKey}]</span><hr style="border-color:rgba(0,255,255,0.2);">`;
                    container.appendChild(sectionTitle);
                    buildAdminInputs(obj[key], deepKey, container);
                } else if (typeof obj[key] === 'number') {
                    let friendlyName = key
                        .replace(/([A-Z])/g, ' $1')
                        .replace(/^./, str => str.toUpperCase());
                    
                    let w = document.createElement('div');
                    w.style = "display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:4px;";
                    w.innerHTML = `
                        <label style="color:#fff; font-size:12px; font-weight:600; text-transform:uppercase;">${friendlyName}</label>
                        <input type="number" step="any" data-key="${deepKey}" value="${obj[key]}" style="width:100px; text-align:right; background:rgba(0,0,0,0.4); border:1px solid #00ffff; color:#00ffff; border-radius:4px; padding:6px; font-weight:bold;">
                    `;
                    container.appendChild(w);
                }
            }
        }

        // Delay para garantir que socketGlob foi inicializado
        setTimeout(() => {
            if (socketGlob) {
                socketGlob.on('admin_config_data', (config) => {
                    currentAdminConfig = config;
                    adminFields.innerHTML = '';
                    buildAdminInputs(config, '', adminFields);
                });
            }
        }, 1000);

        btnSaveAdmin.addEventListener('click', () => {
            if (!currentAdminConfig || !socketGlob) return;
            
            // Build new config from inputs
            let inputs = adminFields.querySelectorAll('input');
            let newConfig = JSON.parse(JSON.stringify(currentAdminConfig)); // clone
            
            inputs.forEach(inp => {
                let keys = inp.getAttribute('data-key').split('.');
                let ref = newConfig;
                for (let i = 0; i < keys.length - 1; i++) ref = ref[keys[i]];
                ref[keys[keys.length - 1]] = parseFloat(inp.value);
            });

            socketGlob.emit('admin_update_config', newConfig);
            alert("✅ Novos parâmetros enviados à Nuvem OCI com sucesso!");
        });

        UI.play.addEventListener('click', startGame);

        UI.skins.addEventListener('click', () => { gameState = 'skin-menu'; UI.start.style.display = 'none'; UI.preview.classList.remove('hidden'); UI.skinName.innerText = SKIN_NAMES[skinIndex]; });

        UI.quality.addEventListener('click', () => {
            isHighQuality = !isHighQuality;
            UI.qualityVal.innerText = isHighQuality ? "ALTA" : "BAIXA";
            UI.qualityVal.style.color = isHighQuality ? "#00ff88" : "#ff5555";
        });
        UI.qualityVal.innerText = isHighQuality ? "ALTA" : "BAIXA";
        UI.qualityVal.style.color = isHighQuality ? "#00ff88" : "#ff5555";
        UI.ok.addEventListener('click', () => { UI.preview.classList.add('hidden'); UI.start.style.display = 'flex'; gameState = 'menu'; });
        UI.left.addEventListener('click', () => { skinIndex = (skinIndex - 1 + SKINS.length) % SKINS.length; UI.skinName.innerText = SKIN_NAMES[skinIndex]; });
        UI.right.addEventListener('click', () => { skinIndex = (skinIndex + 1) % SKINS.length; UI.skinName.innerText = SKIN_NAMES[skinIndex]; });
        UI.again.addEventListener('click', () => { UI.death.classList.add('hidden'); UI.start.style.display = 'flex'; gameState = 'menu'; });

        let joystickTouchId = null;

        UI.joyB.addEventListener('touchstart', (e) => {
            if (joystickTouchId !== null) return;
            const touch = e.changedTouches[0];
            joystickTouchId = touch.identifier;
            joystickActive = true;
            const r = UI.joyB.getBoundingClientRect(), cX = r.left + r.width / 2, cY = r.top + r.height / 2;
            joystickAngle = Math.atan2(touch.clientY - cY, touch.clientX - cX);
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (joystickActive && joystickTouchId !== null) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === joystickTouchId) {
                        const r = UI.joyB.getBoundingClientRect(), cX = r.left + r.width / 2, cY = r.top + r.height / 2;
                        const dx = touch.clientX - cX, dy = touch.clientY - cY, dist = Math.hypot(dx, dy), maxD = r.width / 2;
                        joystickAngle = Math.atan2(dy, dx); const capD = Math.min(dist, maxD);
                        UI.joyH.style.transform = `translate(calc(-50% + ${Math.cos(joystickAngle) * capD}px), calc(-50% + ${Math.sin(joystickAngle) * capD}px))`;
                        if (e.cancelable) e.preventDefault();
                        break;
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (joystickActive && joystickTouchId !== null) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickTouchId) {
                        joystickActive = false; joystickTouchId = null;
                        UI.joyH.style.transform = 'translate(-50%, -50%)';
                        break;
                    }
                }
            }
        });

        window.addEventListener('touchcancel', (e) => {
            if (joystickActive && joystickTouchId !== null) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickTouchId) {
                        joystickActive = false; joystickTouchId = null;
                        UI.joyH.style.transform = 'translate(-50%, -50%)';
                        break;
                    }
                }
            }
        });

        UI.boost.addEventListener('touchstart', (e) => { isMouseDown = true; if (e.cancelable) e.preventDefault(); e.stopPropagation(); }, { passive: false });
        UI.boost.addEventListener('touchend', (e) => { isMouseDown = false; if (e.cancelable) e.preventDefault(); e.stopPropagation(); }, { passive: false });
        UI.boost.addEventListener('touchcancel', (e) => { isMouseDown = false; if (e.cancelable) e.preventDefault(); e.stopPropagation(); }, { passive: false });

        resize();
        if (!IS_MOBILE_CLIENT) {
            for (let i = 0; i < CONFIG.visual.quantidadeVagalumes; i++) fireflies.push(new Firefly());
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>

</html>
