<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Serpente - O Conto do Rei</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --primary: #00E5FF;
            --primary-glow: rgba(0, 229, 255, 0.4);
            --secondary: #FF006E;
            --accent: #FFD700;
            --success: #00FF88;
            --danger: #FF3366;
            --bg-dark: #050814;
            --bg-modal: rgba(10, 14, 30, 0.75);
            --text-main: #FFFFFF;
            --text-dim: #8A99B5;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(15, 20, 40, 0.4);
        }

        /* RESET ABSOLUTO - PREVINE QUALQUER SCROLL OU ARRASTE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body,
        html {
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            touch-action: none;
            overscroll-behavior: none;
            color: var(--text-main);
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* CLASSES UTILITÁRIAS PREMIUM */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            pointer-events: auto;
        }

        .btn-premium {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15) 0%, rgba(0, 153, 204, 0.05) 100%);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 50px;
            padding: 14px 24px;
            min-height: 52px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), inset 0 0 0 transparent;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-premium:hover,
        .btn-premium:active {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.3) 0%, rgba(0, 153, 204, 0.15) 100%);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow), inset 0 0 10px var(--primary-glow);
            transform: translateY(-2px);
            color: #FFF;
        }

        /* -------------------------------------------------------------
           MENU INICIAL (START SCREEN)
           ------------------------------------------------------------- */
        #start-menu {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, #03050a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
            padding-top: max(16px, env(safe-area-inset-top));
            gap: clamp(16px, 3.5vh, 32px);
        }

        .logo-wrapper {
            text-align: center;
            animation: float 4s ease-in-out infinite;
        }

        .logo-title {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #FFFFFF 0%, #A0E5FF 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4));
            line-height: 1;
        }

        .logo-subtitle {
            font-size: clamp(12px, 2.5vw, 18px);
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0.9;
        }

        .menu-core {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 340px;
            padding: 0 20px;
        }

        #nickname {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-bottom: 2px solid var(--primary);
            color: #FFF;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        #nickname:focus {
            background: rgba(0, 229, 255, 0.05);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.15);
        }

        #nickname::placeholder {
            color: var(--text-dim);
            font-weight: 400;
        }

        #play-btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 20px var(--primary-glow);
            transition: all 0.2s;
        }

        #play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.6);
            background: #FFF;
        }

        /* BOTÕES INFERIORES DO MENU (SKINS, ACESSÓRIOS, OPÇÕES) */
        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: clamp(15px, 4vw, 40px);
            pointer-events: none;
            width: 100%;
            padding: clamp(16px, 3vh, 32px) 0 max(20px, env(safe-area-inset-bottom));
        }

        .action-icon-btn {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: transparent;
            border: none;
            outline: none;
        }

        .action-icon-btn:hover {
            transform: translateY(-8px) scale(1.1);
        }

        .action-icon-wrapper {
            width: clamp(50px, 12vw, 64px);
            height: clamp(50px, 12vw, 64px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }

        .action-icon-btn:hover .action-icon-wrapper {
            border-color: var(--primary);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .action-icon-btn svg {
            width: 50%;
            height: 50%;
            stroke: var(--text-main);
            transition: stroke 0.3s;
        }

        .action-icon-btn:hover svg {
            stroke: var(--primary);
        }

        .action-icon-label {
            font-size: clamp(9px, 2.5vw, 11px);
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .action-icon-btn:hover .action-icon-label {
            color: var(--primary);
        }

        /* PAINEL DE MISSÕES */
        #missions-panel {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: max(20px, env(safe-area-inset-left));
            width: clamp(220px, 25vw, 280px);
            padding: 16px;
        }

        .mission-header {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .m-desc {
            font-size: 11px;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .m-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .m-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.8s ease;
        }

        .mission-item:last-child .m-bar {
            margin-bottom: 0;
        }

        /* -------------------------------------------------------------
           IN-GAME HUD (CABEÇALHO & MAPA)
           ------------------------------------------------------------- */
        .hud-container {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: max(20px, env(safe-area-inset-left));
            right: max(20px, env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        #hud-status {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            padding: 10px 30px;
            border-radius: 30px;
            z-index: 50;
            width: max-content;
        }

        .hud-stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .hud-stat-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .hud-stat-value {
            font-size: 22px;
            font-weight: 900;
            color: #FFF;
            text-shadow: 0 2px 10px rgba(0, 229, 255, 0.5);
            line-height: 1;
        }

        .hud-stat-value span {
            color: var(--primary);
        }

        #leaderboard {
            width: 140px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-left: auto;
            pointer-events: auto;
            background: rgba(10, 15, 25, 0.15);
            /* More transparent */
            backdrop-filter: blur(4px);
            /* Less blur */
            border: 1px solid rgba(255, 255, 255, 0.05);
            /* Lighter border */
            box-shadow: none;
            /* Remove thick shadow */
        }

        .lb-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 2px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 4px;
        }

        #lb-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .lb-entry {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-dim);
            padding: 2px 4px;
            border-radius: 6px;
        }

        .lb-entry.is-me {
            background: rgba(0, 229, 255, 0.15);
            color: #FFF;
            font-weight: 800;
        }

        .lb-entry span:last-child {
            color: var(--success);
            font-family: 'Space Mono', monospace;
        }

        #minimap-wrapper {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: max(20px, env(safe-area-inset-right));
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            overflow: hidden;
        }

        #minimap {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
        }

        /* -------------------------------------------------------------
           POWER UPS HUD
           ------------------------------------------------------------- */
        #powerup-hud {
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 55;
            pointer-events: none;
        }

        .powerup-slot {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(145deg, rgba(20, 20, 28, 0.85), rgba(0, 0, 0, 0.85));
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            position: relative;
            backdrop-filter: blur(8px);
            animation: powerupPulse 1.6s ease-in-out infinite;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .powerup-slot.shield {
            border-color: #4dd2ff;
            box-shadow: 0 0 18px rgba(77, 210, 255, 0.45);
        }

        .powerup-slot.magnet {
            border-color: #ff6bd6;
            box-shadow: 0 0 18px rgba(255, 107, 214, 0.45);
        }

        .powerup-slot.ghost {
            border-color: #b9a4ff;
            box-shadow: 0 0 18px rgba(185, 164, 255, 0.45);
        }

        .powerup-slot.mega {
            border-color: #ffe14a;
            box-shadow: 0 0 18px rgba(255, 225, 74, 0.55);
        }

        .powerup-slot .pu-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: currentColor;
            color: #fff;
            transition: width 0.1s linear;
        }

        @keyframes powerupPulse {

            0%,
            100% {
                transform: scale(1);
                filter: brightness(1);
            }

            50% {
                transform: scale(1.08);
                filter: brightness(1.4);
            }
        }

        /* -------------------------------------------------------------
           CONTROLES MOBILE
           ------------------------------------------------------------- */
        #mobile-controls {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
        }

        #joystick-base {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(0, 0, 0, 0.2) 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            transition: opacity 0.2s, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #joystick-base.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #joystick-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow), inset 0 -4px 10px rgba(0, 0, 0, 0.3);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #btn-turbo {
            position: absolute;
            bottom: max(40px, env(safe-area-inset-bottom));
            right: max(40px, env(safe-area-inset-right));
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(10, 14, 30, 0.6);
            border: 2px solid var(--accent);
            color: var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            touch-action: none;
            transition: all 0.15s;
        }

        #btn-turbo svg {
            width: 40%;
            height: 40%;
            fill: currentColor;
            margin-bottom: 2px;
        }

        #btn-turbo span {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        #btn-turbo:active,
        #btn-turbo.boosting {
            transform: scale(0.9);
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        /* -------------------------------------------------------------
           MODAIS (SKINS, ACESSÓRIOS, OPÇÕES, MORTE)
           ------------------------------------------------------------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 4, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(180deg, rgba(15, 20, 40, 0.8) 0%, rgba(5, 8, 20, 0.95) 100%);
            border: none;
            border-radius: 24px;
            width: 90%;
            max-width: 850px;
            max-height: 90dvh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 2px 0 rgba(255, 255, 255, 0.05);
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .modal-content.no-card {
            background: transparent;
            box-shadow: none;
            border-radius: 0;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: #FFF;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: rgba(255, 50, 100, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 20px 24px;
            display: flex;
            justify-content: flex-end;
        }

        /* SHOWROOM DE SKINS E ACESSÓRIOS */
        .showroom-stage {
            width: 100%;
            height: 160px;
            background: transparent;
            border-radius: 16px;
            border: none;
            box-shadow: none;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .showroom-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .item-info {
            position: absolute;
            top: 12px;
            left: 16px;
        }

        .item-name {
            font-size: 18px;
            font-weight: 900;
            color: #FFF;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .item-rarity {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* GRID DE SKINS */
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 12px;
            padding-bottom: 10px;
        }

        .skin-orb {
            aspect-ratio: 1;
            border-radius: 50%;
            background: #111;
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .skin-orb:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .skin-orb.selected {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: scale(1.15);
        }

        .skin-orb.locked {
            filter: grayscale(1) brightness(0.4);
            opacity: 0.7;
        }

        .skin-orb.locked::after {
            content: '🔒';
            position: absolute;
            font-size: 20px;
        }

        .skin-orb canvas {
            width: 110%;
            height: 110%;
            object-fit: cover;
        }

        /* CONTROLES DE ACESSÓRIOS (SETAS) */
        .acc-controls {
            position: absolute;
            bottom: 16px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
        }

        .acc-arrow {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #FFF;
            transition: all 0.2s;
        }

        .acc-arrow:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
            transform: scale(1.1);
        }

        /* TELA DE MORTE */
        #death-content {
            text-align: center;
            padding: 40px 20px;
        }

        .death-title {
            font-size: clamp(32px, 6vw, 48px);
            font-weight: 900;
            color: var(--danger);
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
            margin-bottom: 8px;
        }

        .death-msg {
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .stats-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        .stats-main-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .stats-main-value {
            font-size: clamp(40px, 8vw, 64px);
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            line-height: 1;
            margin-bottom: 20px;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-item span:first-child {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .stat-item span:last-child {
            font-size: 18px;
            font-weight: 800;
            color: #FFF;
        }

        .death-actions {
            display: flex;
            gap: 16px;
        }

        .death-actions button {
            flex: 1;
            padding: 16px;
        }

        /* POPUP DE EVOLUÇÃO */
        #level-popup {
            position: absolute;
            top: 13%;
            left: 50%;
            transform: translateX(-50%) scale(0.5);
            opacity: 0;
            z-index: 80;
            text-align: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.55);
            padding: clamp(10px, 3vw, 18px) clamp(18px, 5vw, 36px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
        }

        #level-popup.show {
            animation: popTitle 3.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        #level-popup h3 {
            margin: 0;
            font-size: clamp(9px, 2vw, 13px);
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #level-popup h1 {
            margin: 4px 0 0 0;
            font-size: clamp(24px, 5.5vw, 42px);
            font-weight: 800;
            text-shadow: 0 0 24px currentColor, 0 0 8px currentColor;
            text-transform: uppercase;
            line-height: 1.1;
        }

        /* ANIMAÇÕES GERAIS */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes popTitle {
            0% {
                transform: translateX(-50%) scale(0.5);
                opacity: 0;
            }

            20% {
                transform: translateX(-50%) scale(1.1);
                opacity: 1;
            }

            30% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }

            80% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateX(-50%) scale(0.8);
                opacity: 0;
            }
        }

        .hidden {
            display: none !important;
        }

        /* AJUSTES MOBILE ESPECÍFICOS */
        @media (max-width: 1024px) and (pointer: coarse) {
            #missions-panel {
                display: none;
            }

            .hud-container {
                flex-direction: column;
                gap: 10px;
            }

            #hud-status {
                gap: 10px;
                padding: 6px 16px;
            }



            #minimap-wrapper {
                width: 90px;
                height: 90px;
                top: max(16px, env(safe-area-inset-top));
                left: max(16px, env(safe-area-inset-left));
                bottom: auto;
                right: auto;
            }

            .modal-content {
                max-height: 95dvh;
                border-radius: 16px;
            }

            #death-content {
                padding: 20px 16px;
            }

            .death-title {
                margin-top: 0;
                margin-bottom: 4px;
            }

            .death-msg {
                margin-bottom: 16px;
            }

            .stats-box {
                margin-bottom: 16px;
                padding: 12px;
            }

            .death-actions button {
                padding: 10px;
            }

            .showroom-stage {
                height: 130px;
            }

            #powerup-hud {
                left: 8px;
                gap: 6px;
            }

            .powerup-slot {
                width: 38px;
                height: 38px;
                font-size: 19px;
                border-radius: 10px;
            }
        }
    </style>
</head>

<body>

                            <path

    <!-- SCRIPT DO JOGO (COM A LÓGICA COMPLETA E HIPER OTIMIZADA) -->
    <script>
        const IS_MOBILE_CLIENT = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 1024 || ('ontouchstart' in window);
        const MOBILE_DPR_CAP = 1.6;
        console.log(`%c 🎮 MODO DETECTADO: ${IS_MOBILE_CLIENT ? 'MOBILE' : 'PC'} `, `background: ${IS_MOBILE_CLIENT ? '#ff0055' : '#007bff'}; color: white; font-weight: bold; border-radius: 4px; padding: 2px 8px;`);

        // ======================================================================
        // 🧬 MOTOR DE NORMALIZAÇÃO DINÂMICA (ENGINE)
        // ======================================================================
        const ENGINE = {
            scale: 1.0,
            dpr: 1.0,
            tier: 'MEDIUM', // LOW, MEDIUM, HIGH
            deltaTime: 1.0,
            lastFrame: performance.now(),

            refresh() {
                this.dpr = IS_MOBILE_CLIENT ? Math.min(window.devicePixelRatio || 1, 1.6) : (window.devicePixelRatio || 1);
                const area = window.innerWidth * window.innerHeight;
                // Escala baseada em área (Referência: 1920x1080)
                this.scale = Math.sqrt(area / 2073600);

                // Compensação Mobile: Garante que em telas pequenas os objetos não fiquem minúsculos
                if (window.innerWidth < 1024) {
                    this.scale *= 1.45;
                }

                // Limites de segurança para evitar valores extremos
                this.scale = Math.max(0.45, Math.min(this.scale, 1.75));

                console.log(`%c ⚙️ ENGINE REFRESH: Scale=${this.scale.toFixed(2)} | DPR=${this.dpr.toFixed(1)} | Tier=${this.tier} `, "background: #111; color: #0f0; border: 1px solid #0f0; padding: 2px 6px;");
            },

            updateTime() {
                const now = performance.now();
                const delta = now - this.lastFrame;
                this.lastFrame = now;
                const calculated = delta / 16.67;
                this.deltaTime = (isNaN(calculated) || calculated < 0.0001) ? 0.01 : Math.min(3.0, calculated);
                return this.deltaTime;
            }
        };
        ENGINE.refresh();

        // Estado inicial da Arena (Declarado antes do CONFIG para evitar ReferenceError no getter)
        let currentArenaRadius = 3000;
        let targetArenaRadius = 3000;

        const CONFIG = {
            get cobra() {
                const s = ENGINE.scale;
                return {
                    espessuraInicial: 5.5 * s,
                    espessuraMaxima: 7.5 * s,
                    comprimentoInicial: IS_MOBILE_CLIENT ? 6 : 4,
                    comprimentoMaximo: 730,
                    velocidadeBase: 1.05 * s,
                    velocidadeTurbo: 2.00 * s,
                    velocidadeGiro: 0.055 * (1 / Math.sqrt(s)), // Giro compensado pela escala
                    distanciaGomos: 0.17,
                    multiplicadorCabeca: 1.03,
                    hitboxMult: 0.85,
                    pontosParaEngrossar: 3400,
                    pontosParaCrescer: 1.0,
                    pontosIniciais: 20,
                    turbo: { custo: 0.2, tamanhoOrbe: 3.5 * s, chanceOrbe: 0.10, quantidadeOrbe: 1 },
                    captura: { raioBase: 10 * s, raioMagnet: 220 * s, forcaAtracao: 8 }
                };
            },
            get zoom() {
                const s = ENGINE.scale;
                return {
                    inicial: 5.10 * (1 / s),
                    minimo: 4.50 * (1 / s),
                    fatorAfastamento: 1.620,
                    velocidadeTransica: 0.011
                };
            },
            get mundo() {
                const s = ENGINE.scale;
                const baseArea = 3000 * 3000 * Math.PI;
                // Proteção contra ReferenceError/TDZ e inicialização
                const radius = (typeof currentArenaRadius !== 'undefined') ? currentArenaRadius : 3000;
                const currentArea = radius * radius * Math.PI;
                const areaFactor = currentArea / baseArea;

                return {
                    tamanhoRaioInicial: 3000,
                    expansaoPorPonto: 28,
                    taxaExpansao: 0.005,
                    distanciaSeguraSpawn: 1200 * s,
                    // Densidade normalizada: Quantidade proporcional ao tamanho do mundo
                    quantidadeBots: Math.floor(150 * areaFactor),
                    quantidadeComida: Math.floor(15000 * areaFactor),
                    quantidadeInsetos: Math.floor(3 * areaFactor),
                    corGrade: '#242424',
                    corFundo: '#000000',
                    tamanhoHexagono: 12 * s,
                    comida: {
                        tamanhoMin: 2.00 * s,
                        tamanhoMax: 4.10 * s,
                        tamanhoMorte: 3.10 * s,
                        tamanhoMorteBonus: 1.60 * s,
                        densidadeBase: 0.15,
                        densidadeCentro: 0.35,
                        densidadeBorda: 0.05
                    }
                };
            },
            powerups: {
                spawnTimerMin: 600,
                spawnTimerMax: 900,
                limiteNoMapa: 0,
                duracao: { shield: 600, magnet: 540, ghost: 360, mega: 300 }
            },
            controles: {
                mobile: { joystickDeadzone: 8, joystickMaxRadius: 58, lerpFactor: 0.52 }
            },
            get visual() {
                const s = ENGINE.scale;
                const isHigh = ENGINE.tier === 'HIGH';
                const isLow = ENGINE.tier === 'LOW';

                return {
                    balancoComida: 410.0,
                    velocidadeAnimacaoComida: 0.04,
                    vagalumes: isLow ? 10 : (isHigh ? 45 : 25),
                    distanciaFugaVagalumes: 150 * s,
                    dRender: (isLow ? 350 : (isHigh ? 650 : 500)) * s
                };
            },
            ai: {
                intervaloBaseDecisao: { hunter: 3, king: 4, cowards: 7 },
                distanciaPerigo: 1.8,
                raioScanMultiplicador: 10
            }
        };

        // DOM MAPPING NOVO UI
        const DOM = {
            startMenu: document.getElementById('start-menu'),
            inGameHud: document.getElementById('ingame-hud'),
            nick: document.getElementById('nickname'),
            score: document.getElementById('score-display'),
            rank: document.getElementById('rank-display'),
            total: document.getElementById('total-display'),
            lbList: document.getElementById('lb-list'),
            miniCanvas: document.getElementById('minimap'),
            joyB: document.getElementById('joystick-base'),
            joyH: document.getElementById('joystick-handle'),
            btnTurbo: document.getElementById('btn-turbo'),
            mobileControls: document.getElementById('mobile-controls'),

            mSkins: document.getElementById('modal-skins'),
            mAccs: document.getElementById('modal-accs'),
            mOptions: document.getElementById('modal-options'),
            mDeath: document.getElementById('modal-death'),

            skinName: document.getElementById('skin-name-display'),
            skinLock: document.getElementById('skin-lock-display'),
            accName: document.getElementById('acc-name-display'),
            accRarity: document.getElementById('acc-rarity-label'),
            skinEquipBtn: document.getElementById('skin-equip-btn'),

            dLen: document.getElementById('death-length'),
            dSize: document.getElementById('death-size'),
            dKills: document.getElementById('death-kills'),
            dMsg: document.getElementById('death-msg-text'),

            lvlPopup: document.getElementById('level-popup'),
            lvlTitle: document.getElementById('level-title-text')
        };

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // Binds de Menus
        document.getElementById('btn-open-skins').onclick = () => {
            openModal('modal-skins'); gameState = 'skin-menu';
            document.getElementById('skins-carousel-view').classList.remove('hidden');
            document.getElementById('skins-carousel-footer').classList.remove('hidden');
            document.getElementById('skins-builder-view').classList.add('hidden');
            document.getElementById('skins-builder-footer').classList.add('hidden');
            updateSkinUI();
        };

            update() {

                            }
                            foods.push(new Food(t.x + (Math.random() * 14 - 7), t.y + (Math.random() * 14 - 7), CONFIG.cobra.turbo.tamanhoOrbe, boostColor, 2, CONFIG.cobra.turbo.custo));
                        }

                let pX = this.x, pY = this.y, spcSq = (this.radius * this.conf.distanciaGomos) ** 2;
                let spc = this.radius * this.conf.distanciaGomos;
                for (let i = 0; i < this.segments.length; i++) {
                    let s = this.segments[i], dx = pX - s.x, dy = pY - s.y, dSq = dx * dx + dy * dy;

                    let f = foods[i]; if (!f || f.dead) continue;
                    let dx = f.x - this.x, dy = f.y - this.y; let distSq = dx * dx + dy * dy; let hitDist = (this.radius * 0.82) + f.radius; let hitDistSq = hitDist * hitDist;

            }
            die(dropFood = true) {

                    let msg = "FOI QUASE..."; if (this.score > 2000) msg = "BOM TRABALHO!"; if (this.score > 5000) msg = "UM VERDADEIRO REI!"; if (this.score > 15000) msg = "LENDÁRIO!";

                }

                    // Distribuição equilibrada: 1 orb a cada ~4 segmentos, limitada para performance
                    const numOrbs = Math.min(250, Math.floor(this.segments.length / 4));
                    if (numOrbs > 0) {
                        const valPerOrb = totalValue / numOrbs;
                        const segmentStep = Math.max(1, Math.floor(this.segments.length / numOrbs));

                        for (let i = 0; i < this.segments.length; i += segmentStep) {
                            const seg = this.segments[i];

                            // Desvio orgânico suave para não parecer uma linha perfeitamente reta
                            const drift = this.radius * 1.2;

        DOM.btnTurbo.addEventListener('touchcancel', (e) => { isMouseDown = false; DOM.btnTurbo.classList.remove('boosting'); e.stopPropagation(); }, { passive: false });

        let touchStartX = 0, touchStartY = 0, swipeTouchId = null, swipeStartTime = 0;
        window.addEventListener('touchstart', e => { if (e.target.closest('#btn-turbo') || e.target.closest('#joystick-base')) return; if (swipeTouchId === null) { swipeTouchId = e.changedTouches[0].identifier; touchStartX = e.changedTouches[0].clientX; touchStartY = e.changedTouches[0].clientY; swipeStartTime = performance.now(); } }, { passive: true });
        window.addEventListener('touchend', e => {
            if (gameState !== 'playing' || !player) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === swipeTouchId) {
                    let dx = e.changedTouches[i].clientX - touchStartX, dy = e.changedTouches[i].clientY - touchStartY; let dt = performance.now() - swipeStartTime;
                    if (dt < 300 && (Math.abs(dx) > 50 || Math.abs(dy) > 50)) {
                        if (player.score > 25) {
                            player.score -= 15;
                            player.speed = CONFIG.cobra.velocidadeTurbo * 1.8;
                            AudioSys.play('dash'); Haptic.medium();
                            createExplosion(player.x, player.y, '#ffdf00', 12);
                            for (let x = 0; x < 6; x++) if (APP_SETTINGS.highGfx) player.trails.push({ x: player.x, y: player.y, life: 1.8 });
                            setTimeout(() => { if (player && !player.isBoosting) player.speed = CONFIG.cobra.velocidadeBase; }, 250);
                        }
                    } swipeTouchId = null;
                }
            }
        });

        resize(); updateMissionsUI();
        DOM.nick.value = localStorage.getItem('serpente_nick') || '';
        DOM.nick.addEventListener('input', () => { const now = performance.now(); if (now - lastNicknameSave < 180) return; lastNicknameSave = now; localStorage.setItem('serpente_nick', DOM.nick.value.trim()); });
        DOM.nick.addEventListener('blur', () => { localStorage.setItem('serpente_nick', DOM.nick.value.trim()); });
        document.addEventListener('visibilitychange', () => { if (!document.hidden) lastFrameTime = performance.now(); });

        let cfgMundoInitial = CONFIG.mundo;
        // Inicialização leve: Spawna apenas 15 bots no início, o restante vem pelo loop gradualmente
        for (let i = 0; i < Math.min(15, cfgMundoInitial.quantidadeBots); i++) {
            let sI = Math.floor(Math.random() * SKINS.length);
            let aI = Math.random() < 0.2 ? Math.floor(Math.random() * ACCESSORIES.length) : 0;
            snakes.push(new Snake(...Object.values(getSafeSpawnPos(400)), getUniqueBotName(), sI, false, CONFIG.cobra.pontosIniciais, aI));
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
