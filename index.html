<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Serpente - O Conto do Rei</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        /* =============================================
           DESIGN SYSTEM — Serpente 2026
           Premium Dark · Glassmorphism · WCAG AA
        ============================================= */
        :root {
            --bg: #06060a;
            --surface: rgba(255, 255, 255, 0.045);
            --surface-md: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --border-hi: rgba(255, 255, 255, 0.14);
            --gold: #FFD60A;
            --gold-dim: rgba(255, 214, 10, 0.22);
            --gold-glow: rgba(255, 214, 10, 0.45);
            --text-1: rgba(255, 255, 255, 0.92);
            --text-2: rgba(255, 255, 255, 0.50);
            --text-3: rgba(255, 255, 255, 0.28);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-pill: 100px;
            --blur: blur(20px) saturate(160%);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* RESET */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: none;
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            color: var(--text-1);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* GLASS PANEL */
        .glass-panel {
            background: var(--surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-1);
            pointer-events: auto;
        }

        /* ── HUD STATUS (PC: bottom-left) ── */
        #hud-status {
            position: absolute;
            bottom: 24px;
            left: 24px;
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 14px 22px 12px;
            border-radius: var(--radius-md);
            z-index: 50;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .hud-label {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-3);
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .hud-value {
            font-size: clamp(18px, 2.2vw, 24px);
            font-weight: 800;
            color: var(--gold);
            line-height: 1;
            text-shadow: 0 0 16px var(--gold-dim);
        }

        .hud-stat {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        @media (max-width: 1024px) {
            #hud-status {
                bottom: 10px !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
                flex-direction: row !important;
                gap: 18px !important;
                padding: 7px 20px !important;
                border-radius: var(--radius-pill) !important;
                white-space: nowrap;
                background: rgba(6, 6, 10, 0.75) !important;
            }

            .hud-stat {
                flex-direction: row;
                align-items: center;
                gap: 6px;
            }

            .hud-label {
                font-size: 7px !important;
            }

            .hud-value {
                font-size: 15px !important;
            }
        }

        /* ── ENERGY BAR ── */
        #energy-bar-inline {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        #energy-bar-fill {
            height: 100%;
            width: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #00e87a, #FFD60A);
            transition: width .12s var(--ease), background .3s;
        }

        @media (max-width: 1024px) {
            #energy-bar-inline {
                width: 60px;
                margin-top: 0;
                align-self: center;
            }
        }

        /* ── LEADERBOARD ── */
        #leaderboard {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 175px;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            display: none;
            font-size: 10px;
            background: rgba(6, 6, 10, 0.5);
            border-color: var(--border);
        }

        #lb-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .lb-entry {
            display: flex;
            justify-content: space-between;
            color: var(--text-2);
            font-weight: 500;
            transition: color .2s;
        }

        .lb-entry.is-me {
            color: var(--gold) !important;
            font-weight: 800;
        }

        /* ── MINIMAP ──
           CORRECAO BUG 3: Container agora 140px para coincidir com o canvas JS (140x140)
           O canvas era recortado quando o container estava em 96px/100px
        */
        #minimap-wrapper {
            position: absolute;
            top: 16px;
            left: 16px;
            display: none;
            z-index: 60;
        }

        #minimap-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 1px solid var(--border-hi);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
        }

        /* ── SKIN BUTTON ── */
        #skins-btn {
            position: absolute;
            bottom: 28px;
            right: 28px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: transform .25s var(--spring), opacity .2s;
            text-align: center;
            z-index: 50;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            backdrop-filter: var(--blur);
        }

        #skins-btn:hover {
            transform: translateY(-3px) scale(1.04);
            border-color: var(--border-hi);
        }

        #skins-btn:active {
            transform: scale(0.95);
        }

        #skins-btn span {
            font-weight: 700;
            color: var(--gold);
            font-size: 9px;
            letter-spacing: .12em;
        }

        @media (max-width:1024px) {
            #skins-btn {
                bottom: 18px;
                right: 18px;
                transform: scale(0.88);
            }
        }

        /* ── START / DEATH SCREENS ── */
        #start-menu,
        #death-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, rgba(20, 20, 30, 0.92) 0%, var(--bg) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
            gap: 0;
        }

        /* Logo */
        .logo-container {
            font-size: clamp(44px, 11vw, 88px);
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 4px;
            letter-spacing: -2px;
        }

        .slither-text {
            color: var(--gold);
            text-shadow: 0 0 32px var(--gold-glow);
        }

        .subtitle {
            font-size: clamp(8px, 1.2vw, 11px);
            font-weight: 600;
            letter-spacing: .32em;
            color: var(--text-3);
            text-transform: uppercase;
            margin-bottom: 36px;
            margin-top: 6px;
        }

        /* Death title */
        #death-screen h2 {
            font-size: clamp(28px, 7vw, 64px);
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 40px var(--gold-glow);
            text-transform: uppercase;
            letter-spacing: -.02em;
            margin: 0 16px 28px;
            line-height: 1.05;
            text-align: center;
        }

        /* Death card */
        .death-stats-box {
            padding: clamp(24px, 5vw, 44px) clamp(28px, 9vw, 88px);
            border-radius: var(--radius-lg);
            margin-bottom: clamp(20px, 4vw, 32px);
            text-align: center;
            border-color: rgba(255, 214, 10, 0.18);
            background: rgba(255, 214, 10, 0.04);
            width: clamp(260px, 85vw, 440px);
        }

        .stat-label {
            font-size: clamp(9px, 2vw, 11px);
            font-weight: 600;
            color: var(--text-3);
            letter-spacing: .18em;
            text-transform: uppercase;
            margin: 0 0 4px;
        }

        #death-length {
            font-size: clamp(48px, 13vw, 80px);
            font-weight: 900;
            color: var(--gold);
            line-height: 1.1;
            margin: 0;
            text-shadow: 0 0 24px var(--gold-dim);
        }

        .death-sub {
            margin-top: 14px;
            font-weight: 600;
            color: var(--text-2);
            font-size: clamp(12px, 3vw, 15px);
        }

        .death-sub b {
            color: var(--gold);
        }

        #death-record {
            margin-top: 10px;
            font-size: clamp(10px, 2.5vw, 13px);
            font-weight: 700;
            color: var(--text-3);
            letter-spacing: .14em;
            text-transform: uppercase;
        }

        #death-record.new-record {
            color: var(--gold);
            animation: pulseRec .9s infinite alternate;
        }

        @keyframes pulseRec {
            from {
                text-shadow: 0 0 4px rgba(255, 214, 10, .2);
            }

            to {
                text-shadow: 0 0 22px rgba(255, 214, 10, .9);
            }
        }

        /* ── PRIMARY BUTTON (CTA) ── */
        .btn-aaa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: clamp(14px, 3vw, 18px) clamp(36px, 9vw, 72px);
            font-family: inherit;
            font-size: clamp(14px, 3.5vw, 17px);
            font-weight: 800;
            letter-spacing: .06em;
            text-transform: uppercase;
            border-radius: var(--radius-pill);
            border: none;
            background: var(--gold);
            color: #07050A;
            cursor: pointer;
            transition: transform .22s var(--spring), box-shadow .22s var(--ease), background .15s;
            pointer-events: auto;
            width: clamp(220px, 80vw, 320px);
            box-shadow: 0 4px 24px var(--gold-dim);
            -webkit-tap-highlight-color: transparent;
            outline-offset: 3px;
        }

        .btn-aaa:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 36px var(--gold-glow);
        }

        .btn-aaa:active {
            transform: scale(0.96) translateY(0);
            box-shadow: 0 2px 10px var(--gold-dim);
        }

        .btn-aaa:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 4px;
        }

        /* ── INPUT ── */
        #nickname {
            background: var(--surface-md);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 14px 28px;
            color: var(--text-1);
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            width: clamp(220px, 78vw, 300px);
            transition: border-color .2s var(--ease), background .2s, box-shadow .2s;
            backdrop-filter: var(--blur);
            pointer-events: auto;
        }

        #nickname:focus {
            border-color: rgba(255, 214, 10, .5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(255, 214, 10, .1);
        }

        #nickname::placeholder {
            color: var(--text-3);
        }

        /* ── SKIN PREVIEW UI ── */
        #skin-preview-ui {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
            pointer-events: auto;
            background: radial-gradient(circle at center, rgba(6, 6, 10, 0.4) 0%, rgba(6, 6, 10, 0.9) 100%);
            /* backdrop-filter removido para garantir nitidez máxima da cobra */
        }

        #skin-name-display {
            position: absolute;
            top: clamp(14%, 16%, 18%);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(28px, 5.5vw, 48px);
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 32px var(--gold-glow);
            letter-spacing: -.02em;
            white-space: nowrap;
        }

        #skin-counter {
            position: absolute;
            top: calc(clamp(14%, 16%, 18%) + clamp(38px, 7vw, 62px));
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-3);
            font-weight: 600;
            font-size: 11px;
            letter-spacing: .2em;
        }

        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 105;
            background: var(--surface-md);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: var(--blur);
            transition: transform .22s var(--spring), background .2s;
        }

        .arrow-btn:hover {
            transform: translateY(-50%) scale(1.12);
            border-color: var(--border-hi);
        }

        .arrow-btn:active {
            transform: translateY(-50%) scale(0.93);
        }

        #left-arrow {
            left: clamp(20px, 6%, 80px);
        }

        #right-arrow {
            right: clamp(20px, 6%, 80px);
        }

        /* ── TOP1 BANNER ── */
        #top1-banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(26px, 6.5vw, 58px);
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 48px var(--gold-glow), 0 4px 16px rgba(0, 0, 0, .9);
            text-align: center;
            z-index: 200;
            pointer-events: none;
            white-space: nowrap;
            transition: transform .4s var(--spring), opacity .5s var(--ease);
            opacity: 0;
            letter-spacing: -.02em;
        }

        #top1-banner.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* ── MOBILE CONTROLS ── */
        #mobile-controls {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }

        #joystick-base {
            position: absolute;
            bottom: 32px;
            left: 32px;
            width: 112px;
            height: 112px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(6px);
            pointer-events: auto;
            touch-action: none;
        }

        #joystick-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.32);
            box-shadow: 0 4px 18px rgba(0, 0, 0, .25);
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: background .15s;
        }

        .action-btn {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: var(--gold);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            transition: transform .12s var(--spring), background .12s;
        }

        .action-btn:active {
            transform: scale(0.88);
            background: rgba(255, 214, 10, 0.22);
        }

        .action-btn svg {
            width: 46%;
            height: 46%;
            fill: currentColor;
        }

        #btn-turbo {
            bottom: 36px;
            right: 36px;
            width: 68px;
            height: 68px;
            border-color: rgba(255, 214, 10, .3);
        }

        #gesture-hint {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-3);
            font-size: 11px;
            font-weight: 600;
            pointer-events: none;
            letter-spacing: .14em;
            text-align: center;
            animation: fadeOut 5s forwards;
        }

        @keyframes fadeOut {

            0%,
            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* ── ORIENTATION OVERLAY ── */
        #orientation-overlay {
            position: fixed;
            inset: 0;
            background: rgba(6, 6, 10, .95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--gold);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ── SCREEN FADE IN ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #start-menu>*,
        #death-screen>* {
            animation: fadeInUp .35s var(--ease) both;
        }

        #start-menu>*:nth-child(1) {
            animation-delay: .05s;
        }

        #start-menu>*:nth-child(2) {
            animation-delay: .10s;
        }

        #start-menu>*:nth-child(3) {
            animation-delay: .15s;
        }

        #start-menu>*:nth-child(4) {
            animation-delay: .20s;
        }

        #start-menu>*:nth-child(5) {
            animation-delay: .25s;
        }

        #death-screen>*:nth-child(1) {
            animation-delay: .04s;
        }

        #death-screen>*:nth-child(2) {
            animation-delay: .12s;
        }

        #death-screen>*:nth-child(3) {
            animation-delay: .20s;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud-status" class="glass-panel">
            <div class="hud-stat">
                <span class="hud-label">Abundância</span>
                <span class="hud-value" id="score-display">0</span>
            </div>
            <div class="hud-stat">
                <span class="hud-label">Rank</span>
                <span class="hud-value" id="rank-display">0</span>
                <span class="hud-label" style="align-self:center">/</span>
                <span class="hud-value" id="total-display"
                    style="color:var(--text-2);font-size:clamp(14px,1.6vw,18px)">0</span>
            </div>
            <div id="energy-bar-inline">
                <div id="energy-bar-fill"></div>
            </div>
        </div>

        <div id="leaderboard" class="glass-panel">
            <div id="lb-list"></div>
        </div>
        <div id="minimap-wrapper">
            <div id="minimap-container" class="glass-panel"><canvas id="minimap"></canvas></div>
        </div>

        <div id="top1-banner">&#128081; VOC&#202; &#201; O REI!</div>

        <div id="mobile-controls">
            <div id="joystick-base">
                <div id="joystick-handle"></div>
            </div>
            <div id="btn-turbo" class="action-btn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M13 2.05v3.03c3.39.49 6 3.39 6 6.92 0 .9-.22 1.75-.61 2.51l2.33 2.33c.8-1.43 1.28-3.08 1.28-4.84 0-4.95-3.64-9.05-8-9.95zM12 19c-3.87 0-7-3.13-7-7 0-3.53 2.61-6.43 6-6.92V2.05C6.36 2.95 3 7.05 3 12c0 4.97 4.03 9 9 9 2.22 0 4.24-.81 5.8-2.14l-2.2-2.2C14.6 18.25 13.35 19 12 19zm4.23-2.61c.42-.45.79-.95 1.1-1.49l-2.15-2.15c-.15.25-.33.48-.53.69l1.58 2.95zM12 6.5c-3.03 0-5.5 2.47-5.5 5.5s2.47 5.5 5.5 5.5 5.5-2.47 5.5-5.5-2.47-5.5-5.5-5.5z" />
                </svg>
            </div>
            <div id="gesture-hint">SWIPE NA TELA PARA DASH<br>👆 👇 👈 👉</div>
        </div>

        <div id="start-menu">
            <div class="logo-container">
                <div role="img" aria-label="coroa">&#128081;</div><span class="slither-text">Serpente</span>
            </div>
            <div class="subtitle">O Conto da Coroa Dourada</div>
            <input type="text" id="nickname" placeholder="Nome da lenda" maxlength="16" autocomplete="off"
                autocorrect="off" spellcheck="false" aria-label="Seu nome no jogo">
            <button id="play-btn" class="btn-aaa" aria-label="Iniciar partida">Iniciar Jornada</button>

            <div id="skins-btn" role="button" aria-label="Mudar escamas" tabindex="0">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path
                        d="M8 17C5.23858 17 3 14.7614 3 12C3 9.23858 5.23858 7 8 7H13C15.7614 7 18 4.76142 18 2H20C20 5.86599 16.866 9 13 9H8C6.34315 9 5 10.3431 5 12C5 13.6569 6.34315 15 8 15H18C20.7614 15 23 17.2386 23 20V22H21V20C21 18.3431 19.6569 17 18 17H8Z"
                        fill="#00e87a" />
                    <circle cx="20" cy="5" r="1.5" fill="#FFD60A" />
                </svg>
                <span>Mudar Escamas</span>
            </div>
        </div>

        <div id="skin-preview-ui" class="hidden">
            <div id="skin-name-display">PELE ORIGINAL</div>
            <div id="skin-counter">1 / 34</div>
            <div id="left-arrow" class="arrow-btn" role="button" aria-label="Skin anterior">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#FFD60A">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                </svg>

        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(freq, type, dur, vol = 0.12, delay = 0) {
            try {
                ensureAudio();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = type; o.frequency.value = freq;
                const t = audioCtx.currentTime + delay;
                g.gain.setValueAtTime(vol, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur);
                o.start(t); o.stop(t + dur + 0.01);
            } catch (e) { }
        }
        function soundEat() { playTone(440, 'sine', 0.07, 0.05); playTone(660, 'sine', 0.07, 0.04, 0.06); }
        function soundBoost() {

                const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.06), audioCtx.sampleRate);
                const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.22;
                const s = audioCtx.createBufferSource(), g = audioCtx.createGain(), f = audioCtx.createBiquadFilter();
                f.type = 'bandpass'; f.frequency.value = 900;
                s.buffer = buf; s.connect(f); f.connect(g); g.connect(audioCtx.destination);
                g.gain.setValueAtTime(0.16, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06); s.start();
            } catch (e) { }

        /* ── GENE POOL (Algoritmo Genético) ── */
        const GENE_POOL_KEY = 'serpente_genepool_v1';
        const GENE_KEYS = ['agressao', 'medo', 'comida', 'boostAtaque', 'boostFuga', 'exploracao'];
        const DEFAULT_GENOME = { agressao: 0.5, medo: 0.5, comida: 0.7, boostAtaque: 0.5, boostFuga: 0.6, exploracao: 0.3 };
        let genePool = [];
        let mlGeneration = 0;

        function loadGenePool() {
            try {
                genePool = JSON.parse(localStorage.getItem(GENE_POOL_KEY) || '[]');
                mlGeneration = genePool.length > 0 ? Math.max(...genePool.map(g => g.gen || 0)) : 0;
            } catch (e) { genePool = []; }
        }
        function saveGenePool() {
            try { localStorage.setItem(GENE_POOL_KEY, JSON.stringify(genePool)); } catch (e) { }
        }
        function recordFitness(genome, score, survivalMs) {
            if (!genome || score < 60) return;
            let fitness = score * (1 + Math.sqrt(survivalMs / 1000));
            mlGeneration++;
            genePool.push({ genome, fitness, gen: mlGeneration });
            genePool.sort((a, b) => b.fitness - a.fitness);
            genePool = genePool.slice(0, 30);
            saveGenePool();
        }
        function selectParent() {
            let pool = genePool.length >= 3 ? genePool : genePool.concat([{ genome: { ...DEFAULT_GENOME } }]);
            let candidates = [0, 1, 2].map(() => pool[Math.floor(Math.random() * pool.length)]);
            return candidates.sort((a, b) => (b.fitness || 0) - (a.fitness || 0))[0].genome;
        }
        function crossover(g1, g2) {
            let c = {}; GENE_KEYS.forEach(k => c[k] = Math.random() < 0.5 ? g1[k] : g2[k]); return c;
        }
        function mutate(genome, rate = 0.25) {
            let g = { ...genome };
            GENE_KEYS.forEach(k => { if (Math.random() < rate) g[k] = Math.max(0.05, Math.min(0.95, g[k] + (Math.random() - 0.5) * 0.35)); });
            return g;
        }
        function getNewGenome() {
            if (genePool.length < 4) return mutate({ ...DEFAULT_GENOME });
            let r = Math.random();
            if (r < 0.65) return mutate(crossover(selectParent(), selectParent()));
            if (r < 0.85) return mutate(selectParent());
            return mutate({ ...DEFAULT_GENOME }, 0.6);
        }
        loadGenePool();

        function getLbColor(hex) {
            if (!hex || hex.length < 7) return '#ffffff';
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            let luma = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            if (luma < 0.28) {
                let f = 0.38 / Math.max(luma, 0.01);
                r = Math.min(255, Math.round(r * f));
                g = Math.min(255, Math.round(g * f));
                b = Math.min(255, Math.round(b * f));
                if ((0.299 * r + 0.587 * g + 0.114 * b) < 60) return 'rgba(255,255,255,0.75)';
                return `rgb(${r},${g},${b})`;
            }
            return hex;

        function drawStandardEyes(ctx, x, y, radius, angle, lookAngle, skinId) {

                ctx.beginPath(); ctx.arc(radius * 0.25 + Math.cos(lA) * pO, Math.sin(lA) * pO, pR * 1.1, 0, Math.PI * 2); ctx.fillStyle = '#111'; ctx.fill();

                let iO = eRL * 0.2;
                ctx.fillStyle = '#00c8e0';
                ctx.beginPath(); ctx.arc(e1x + Math.cos(lA) * iO, e1y + Math.sin(lA) * iO, eRL * 0.58, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x + Math.cos(lA) * iO, e2y + Math.sin(lA) * iO, eRL * 0.58, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath(); ctx.arc(e1x + Math.cos(lA) * iO - eRL * 0.18, e1y + Math.sin(lA) * iO - eRL * 0.18, eRL * 0.1, 0, Math.PI * 2); ctx.fill();

            } else if (skinId === 29) {

                ctx.fillStyle = '#cc0000';
                ctx.beginPath(); ctx.arc(e1x + Math.cos(lA) * pO, e1y + Math.sin(lA) * pO, pR * 1.15, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x + Math.cos(lA) * pO, e2y + Math.sin(lA) * pO, pR * 1.15, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(e1x + Math.cos(lA) * pO, e1y + Math.sin(lA) * pO, pR * 0.45, 0, Math.PI * 2); ctx.fill();

                ctx.strokeStyle = '#880000'; ctx.lineWidth = Math.max(2, radius * 0.07);
                ctx.beginPath(); ctx.moveTo(e1x - eR * 0.6, e1y - eR * 0.9); ctx.lineTo(e1x + eR * 0.5, e1y - eR * 0.45); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(e2x - eR * 0.6, e2y + eR * 0.45); ctx.lineTo(e2x + eR * 0.5, e2y + eR * 0.9); ctx.stroke();
            } else if (skinId === 30) {
                let e1x = Math.cos(-aO) * oD, e1y = Math.sin(-aO) * oD;

                ctx.fillStyle = '#ffaa00';
                ctx.beginPath(); ctx.arc(e1x, e1y, eR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.arc(e2x, e2y, eR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#111';
                ctx.save(); ctx.translate(e1x, e1y);
                ctx.beginPath(); ctx.ellipse(0, 0, eR * 0.16, eR * 0.72, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                ctx.save(); ctx.translate(e2x, e2y);
                ctx.beginPath(); ctx.ellipse(0, 0, eR * 0.16, eR * 0.72, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath(); ctx.arc(e1x - eR * 0.25, e1y - eR * 0.25, eR * 0.12, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x - eR * 0.25, e2y - eR * 0.25, eR * 0.12, 0, Math.PI * 2); ctx.fill();
            } else if (skinId === 31) {
                let e1x = Math.cos(-aO) * oD, e1y = Math.sin(-aO) * oD;
                let e2x = Math.cos(aO) * oD, e2y = Math.sin(aO) * oD;
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(e1x, e1y, eR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.arc(e2x, e2y, eR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                [e1x, e1y, e2x, e2y].reduce((_, __, i, a) => {
                    if (i % 2 !== 0) return;
                    let cx2 = a[i], cy2 = a[i + 1];
                    let colors = ['#9900ff', '#cc00ff', '#aa00ff'];
                    for (let ri = 0; ri < 3; ri++) {
                        let r2 = eR * (0.75 - ri * 0.25);
                        ctx.beginPath(); ctx.arc(cx2, cy2, r2, -Math.PI / 2, Math.PI * 1.2);
                        ctx.strokeStyle = colors[ri]; ctx.lineWidth = Math.max(1.5, radius * 0.05); ctx.stroke();
                    }
                    ctx.fillStyle = '#5500cc';
                    ctx.beginPath(); ctx.arc(cx2, cy2, eR * 0.18, 0, Math.PI * 2); ctx.fill();
                }, null);
            } else if (skinId === 32) {
                let e1x = Math.cos(-aO) * oD, e1y = Math.sin(-aO) * oD;
                let e2x = Math.cos(aO) * oD, e2y = Math.sin(aO) * oD;
                ctx.fillStyle = 'white';

                ctx.beginPath(); ctx.arc(e2x, e2y, eR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.strokeStyle = '#222'; ctx.lineWidth = Math.max(2, radius * 0.07);
                let xO = eR * 0.5;
                [[e1x, e1y], [e2x, e2y]].forEach(([ex, ey]) => {
                    ctx.beginPath(); ctx.moveTo(ex - xO, ey - xO); ctx.lineTo(ex + xO, ey + xO); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(ex + xO, ey - xO); ctx.lineTo(ex - xO, ey + xO); ctx.stroke();
                });
            } else if (skinId === 33) {
                let e1x = Math.cos(-aO) * oD, e1y = Math.sin(-aO) * oD;
                let e2x = Math.cos(aO) * oD, e2y = Math.sin(aO) * oD;
                let e3x = radius * 0.32, e3y = 0;
                let eRS = eR * 0.82;
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(e1x, e1y, eRS, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.arc(e2x, e2y, eRS, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.arc(e3x, e3y, eRS * 0.75, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#0033cc';
                ctx.beginPath(); ctx.arc(e1x + Math.cos(lA) * pO * 0.7, e1y + Math.sin(lA) * pO * 0.7, pR * 0.9, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x + Math.cos(lA) * pO * 0.7, e2y + Math.sin(lA) * pO * 0.7, pR * 0.9, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#00ccff';
                ctx.beginPath(); ctx.arc(e3x + Math.cos(lA) * pO * 0.4, e3y + Math.sin(lA) * pO * 0.4, pR * 0.65, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(e1x + Math.cos(lA) * pO * 0.7, e1y + Math.sin(lA) * pO * 0.7, pR * 0.4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x + Math.cos(lA) * pO * 0.7, e2y + Math.sin(lA) * pO * 0.7, pR * 0.4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e3x + Math.cos(lA) * pO * 0.4, e3y + Math.sin(lA) * pO * 0.4, pR * 0.3, 0, Math.PI * 2); ctx.fill();
            } else {
                let e1x = Math.cos(-aO) * oD, e1y = Math.sin(-aO) * oD;
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(e1x, e1y, eR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                let e2x = Math.cos(aO) * oD, e2y = Math.sin(aO) * oD;
                ctx.beginPath(); ctx.arc(e2x, e2y, eR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(e1x + Math.cos(lA) * pO, e1y + Math.sin(lA) * pO, pR, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x + Math.cos(lA) * pO, e2y + Math.sin(lA) * pO, pR, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }

        /* ── CLASSES ── */
        class Particle {
            constructor(x, y, color, s) { this.x = x; this.y = y; this.color = color; let a = Math.random() * Math.PI * 2; this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s; this.life = 1.0; this.decay = 0.02 + Math.random() * 0.02; this.size = 2 + Math.random() * 3; }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw(ctx) { ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; }
        }

        class Food {
            constructor(x, y, r, c, isD = false, eV = 2) { this.x = x; this.y = y; this.radius = r; this.color = c; this.isDropped = isD; this.value = eV; this.wO = Math.random() * Math.PI * 2; }
            draw(ctx, time) {
                let dx = this.x + Math.cos(time * CONFIG.visual.velocidadeAnimacao + this.wO) * CONFIG.visual.balancoComida;
                let dy = this.y + Math.sin(time * CONFIG.visual.velocidadeAnimacao + this.wO) * CONFIG.visual.balancoComida;
                let img = this.isDropped ? TextureManager.getDroppedFood(this.color) : TextureManager.getFood(this.color);
                ctx.drawImage(img, dx - this.radius, dy - this.radius, this.radius * 2, this.radius * 2);
            }
        }

        class Firefly {
            constructor() {
                let r = Math.sqrt(Math.random()) * WORLD_CENTER, t = Math.random() * 2 * Math.PI;
                this.x = WORLD_CENTER + r * Math.cos(t); this.y = WORLD_CENTER + r * Math.sin(t);
                this.radius = 3 + Math.random() * 3; this.angle = Math.random() * Math.PI * 2;
                this.speed = 1.0; this.color = '#fff'; this.offset = Math.random() * 100;
            }
            update() {
                let dX = 0, dY = 0, count = 0;
                for (let s of snakes) {
                    if (!s.alive) continue;
                    let d = Math.hypot(s.x - this.x, s.y - this.y);
                    if (d < CONFIG.visual.distanciaFugaVagalumes) { dX += s.x; dY += s.y; count++; }
                }
                if (count > 0) {
                    let away = Math.atan2(this.y - (dY / count), this.x - (dX / count));
                    let diff = away - this.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;
                    this.angle += diff * 0.15; this.speed = 4.5;
                } else { this.angle += (Math.random() - 0.5) * 0.1; this.speed = 1.2; }
                this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed;
                if (Math.hypot(this.x - WORLD_CENTER, this.y - WORLD_CENTER) > WORLD_CENTER) this.angle = Math.atan2(WORLD_CENTER - this.y, WORLD_CENTER - this.x);
            }
            draw(ctx, time) {
                let p = Math.sin(time * 0.003 + this.offset), cR = Math.max(1, this.radius + p);
                ctx.beginPath(); ctx.arc(this.x, this.y, cR * 4, 0, Math.PI * 2);
                let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, cR * 4);
                g.addColorStop(0, 'rgba(255,255,255,0.4)'); g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g; ctx.fill();
            }
        }

        class Snake {
            constructor(x, y, n, sI, isP = false, startScore = 40, genome = null) {
                this.x = x; this.y = y; this.name = n; this.skinId = sI; this.skin = SKINS[sI]; this.mainColor = this.skin[0]; this.isPlayer = isP; this.alive = true;
                this.angle = Math.random() * Math.PI * 2; this.targetAngle = this.angle; this.conf = IS_MOBILE_CLIENT ? CONFIG.cobra.mobile : CONFIG.cobra.pc;
                this.speed = this.conf.velocidadeBase; this.isBoosting = false; this.score = startScore;
                this.radius = Math.min(this.conf.espessuraInicial + Math.floor(this.score / CONFIG.cobra.pontosParaEngrossar), this.conf.espessuraMaxima);
                this.targetLength = Math.min(CONFIG.cobra.comprimentoInicial + Math.floor(this.score / CONFIG.cobra.pontosParaCrescer), this.conf.comprimentoMaximo);
                this.segments = [];
                for (let i = 0; i < this.targetLength; i++) this.segments.push({ x: x, y: y });
                this.energy = CONFIG.cobra.energiaMaxima;
                this.genome = isP ? null : (genome || mutate({ ...DEFAULT_GENOME }));
                this.birthTime = Date.now();
            }
            updateAI() {
                const g = this.genome || DEFAULT_GENOME;
                let danger = false, evadeAngle = 0, prey = null, preyDist = Infinity;

                for (let other of snakes) {
                    if (other === this || !other.alive) continue;
                    let d = Math.hypot(other.x - this.x, other.y - this.y);
                    let sizeRatio = other.score / Math.max(1, this.score);
                    let fearDist = this.radius * (8 + g.medo * 10);

                    if (d < fearDist) {
                        let shouldFear = sizeRatio > (1.8 - g.medo * 1.2);
                        if (shouldFear) {
                            for (let k = 0; k < other.segments.length; k += 10) {
                                let segD = Math.hypot(other.segments[k].x - this.x, other.segments[k].y - this.y);
                                if (segD < this.radius * (4 + g.medo * 5)) {
                                    danger = true;
                                    evadeAngle = Math.atan2(this.y - other.segments[k].y, this.x - other.segments[k].x);
                                    break;
                                }
                            }
                        }
                        if (!danger && sizeRatio < (0.85 - g.agressao * 0.3)) {
                            let huntRange = this.radius * (8 + g.agressao * 14);
                            if (d < huntRange && d < preyDist) { preyDist = d; prey = other; }
                        }
                    }
                    if (danger) break;
                }

                if (danger) {
                    this.targetAngle = evadeAngle;
                    this.isBoosting = this.energy > CONFIG.cobra.energiaMinima && g.boostFuga > 0.35;
                } else if (prey) {
                    this.targetAngle = Math.atan2(prey.y - this.y, prey.x - this.x);
                    let boostThresh = this.radius * (6 + g.boostAtaque * 10);
                    this.isBoosting = preyDist < boostThresh && this.energy > CONFIG.cobra.energiaMinima;
                } else {
                    this.isBoosting = false;
                    let updateFreq = Math.floor(12 + (1 - g.exploracao) * 22);
                    if (frameCount % updateFreq === 0) {
                        let nearest = null, minDist = 300 + g.comida * 600;
                        for (let f of foods) {
                            let d = Math.hypot(f.x - this.x, f.y - this.y);
                            if (d < minDist) { minDist = d; nearest = f; }
                        }
                        if (nearest) this.targetAngle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                        else if (Math.random() < 0.08 + g.exploracao * 0.35) this.targetAngle += (Math.random() - 0.5) * 2.2;
                    }
                }
                if (Math.hypot(this.x - WORLD_CENTER, this.y - WORLD_CENTER) > WORLD_CENTER - 600) {
                    this.targetAngle = Math.atan2(WORLD_CENTER - this.y, WORLD_CENTER - this.x);
                    this.isBoosting = false;
                }
            }
            update() {
                if (!this.alive) return;
                this.radius = Math.min(this.conf.espessuraInicial + Math.floor(this.score / CONFIG.cobra.pontosParaEngrossar), this.conf.espessuraMaxima);
                this.targetLength = Math.min(CONFIG.cobra.comprimentoInicial + Math.floor(this.score / CONFIG.cobra.pontosParaCrescer), this.conf.comprimentoMaximo);
                if (this.segments.length < this.targetLength) this.segments.push({ x: this.segments[this.segments.length - 1].x, y: this.segments[this.segments.length - 1].y });

                const eCfg = CONFIG.cobra;
                if (this.isBoosting && this.energy > eCfg.energiaMinima) {
                    this.speed = this.conf.velocidadeTurbo;
                    this.energy = Math.max(0, this.energy - eCfg.energiaDreno);
                    if (Math.random() < 0.25) {
                        let t = this.segments[this.segments.length - 1];
                        foods.push(new Food(t.x + (Math.random() * 10 - 5), t.y + (Math.random() * 10 - 5), 4.5, this.skin[this.segments.length % this.skin.length], true, 0.5));
                    }
                } else {
                    this.speed = this.conf.velocidadeBase;
                    this.isBoosting = false;
                    this.energy = Math.min(eCfg.energiaMaxima, this.energy + eCfg.energiaRecarga);
                }

                if (this.isPlayer) {
                    if (joystickActive) this.targetAngle = joystickAngle;
                    else if (!IS_MOBILE_CLIENT) this.targetAngle = Math.atan2((mouseY - vpHeight / 2) / camera.zoom, (mouseX - vpWidth / 2) / camera.zoom);
                } else this.updateAI();

                let diff = this.targetAngle - this.angle; while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;
                let tS = Math.max(0.04, 0.08 - (this.radius * 0.0012)); if (this.isBoosting) tS *= 1.35;
                if (Math.abs(diff) < tS) this.angle = this.targetAngle; else this.angle += Math.sign(diff) * tS;
                this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed;

                if (Math.hypot(this.x - WORLD_CENTER, this.y - WORLD_CENTER) > WORLD_CENTER) { this.die(false); return; }

                let pX = this.x, pY = this.y, spc = this.radius * this.conf.distanciaGomos;
                for (let i = 0; i < this.segments.length; i++) { let s = this.segments[i], dx = pX - s.x, dy = pY - s.y, d = Math.sqrt(dx * dx + dy * dy); if (d > spc) { let mv = d - spc; s.x += (dx / d) * mv; s.y += (dy / d) * mv; } pX = s.x; pY = s.y; }

                for (let i = foods.length - 1; i >= 0; i--) {
                    let f = foods[i], d2 = (this.x - f.x) ** 2 + (this.y - f.y) ** 2;
                    if (d2 < (CONFIG.mundo.forcaAtracao) ** 2) { let d = Math.sqrt(d2); f.x += (this.x - f.x) / d * 8; f.y += (this.y - f.y) / d * 8; }
                    if (d2 < (this.radius + f.radius) ** 2) {
                        this.score += f.value;
                        foods.splice(i, 1);
                        if (this.isPlayer) {
                            if (f.value > 0.6) soundEat();
                            triggerHaptic('forcaComida');
                        }
                    }
                }
            }
            die(dropFood = true) {
                const survivalMs = Date.now() - (this.birthTime || Date.now());
                this.alive = false; createExplosion(this.x, this.y, this.mainColor, 35);
                if (this.isPlayer) {
                    camera.shake = 25;
                    triggerHaptic('forcaMorte');
                    soundDeath();
                }
                if (dropFood) {
                    let step = 5, num = Math.max(1, Math.floor(this.segments.length / step)), val = this.score / num;
                    for (let i = 0; i < this.segments.length; i += step) { let s = this.segments[i]; foods.push(new Food(s.x + (Math.random() * 20 - 10), s.y + (Math.random() * 20 - 10), 9 + Math.min(10, val / 30), this.skin[i % this.skin.length], true, val)); }
                }
                if (!this.isPlayer) {
                    recordFitness(this.genome, this.score, survivalMs);
                }
                if (this.isPlayer) {
                    soundDeath();
                    const isNewRecord = saveRecord(this.score);
                    gameState = 'dead';
                    setTimeout(() => {
                        UI.deathLen.innerText = Math.floor(this.score).toLocaleString();
                        UI.deathKills.innerText = playerKills;
                        const rec = getRecord();
                        UI.deathRecord.innerText = 'MELHOR: ' + rec.toLocaleString();
                        UI.deathRecord.classList.toggle('new-record', isNewRecord);
                        UI.death.classList.remove('hidden');
                        UI.lb.style.display = 'none'; UI.status.style.display = 'none';
                        UI.mini.style.display = 'none'; UI.ctrls.style.display = 'none';
                    }, 1500);
                }
            }
            draw(ctx) {
                if (!this.alive) return;
                for (let i = this.segments.length - 1; i >= 0; i--) ctx.drawImage(TextureManager.getSegment(this.skin[i % this.skin.length]), this.segments[i].x - this.radius, this.segments[i].y - this.radius, this.radius * 2, this.radius * 2);
                ctx.drawImage(TextureManager.getSegment(this.skin[0]), this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                let look = (joystickActive && this.isPlayer) ? joystickAngle : this.angle;
                drawStandardEyes(ctx, this.x, this.y, this.radius, this.angle, look, this.skinId);
            }
        }

        /* ── ENGINE ── */
        async function enterFullscreen() {
            try {
                const d = document.documentElement;
                if (d.requestFullscreen) await d.requestFullscreen();
                else if (d.webkitRequestFullscreen) await d.webkitRequestFullscreen();
                if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(() => { });
            } catch (e) { console.warn("Fullscreen bloqueado pelo navegador."); }
        }

        /* 📱 HAPTIC FEEDBACK (VIBRAÇÃO)
           Função central para controlar a sensação tátil do jogo.
           Respeita as configurações definidas no objeto CONFIG. */
        function triggerHaptic(type) {
            if (!CONFIG.cobra.tato.ativo || !navigator.vibrate) return;
            const force = CONFIG.cobra.tato[type] || 0;
            if (force > 0) navigator.vibrate(force);
        }

        function resize() {
            vpWidth = window.innerWidth;
            vpHeight = window.innerHeight;
            dpr = window.devicePixelRatio || 1;

            if (gameCanvasElement) {
                gameCanvasElement.width = vpWidth * dpr;
                gameCanvasElement.height = vpHeight * dpr;
                gameCanvasElement.style.width = vpWidth + 'px';
                gameCanvasElement.style.height = vpHeight + 'px';
            }
            if (minimapCanvasElement) {
                // CORRECAO BUG 3: Canvas e container sincronizados em 140px
                minimapCanvasElement.width = 140 * dpr;
                minimapCanvasElement.height = 140 * dpr;
                minimapCanvasElement.style.width = '140px';
                minimapCanvasElement.style.height = '140px';
                mCtxElement.setTransform(1, 0, 0, 1, 0, 0);
                mCtxElement.scale(dpr, dpr);
            }
            if (IS_MOBILE_CLIENT) UI.orient.style.display = vpHeight > vpWidth ? 'flex' : 'none';
        }

        function updateHUD() {
            if (gameState !== 'playing' || !player) return;
            UI.score.innerText = Math.floor(player.score).toLocaleString();
            let act = snakes.filter(s => s.alive); let sorted = [...act].sort((a, b) => b.score - a.score);
            UI.rank.innerText = sorted.findIndex(s => s === player) + 1; UI.total.innerText = sorted.length;
            let html = '';
            for (let i = 0; i < Math.min(10, sorted.length); i++) {
                let s = sorted[i];
                let col = s === player ? '#FFD60A' : getLbColor(s.mainColor);
                html += `<div class="lb-entry ${s === player ? 'is-me' : ''}" style="color: ${col}"><span>#${i + 1} ${s.name}</span><span>${Math.floor(s.score).toLocaleString()}</span></div>`;
            }
            UI.lbList.innerHTML = html;

            // Minimap Overhaul: Slither.io Radar Style
            const mSize = 140;
            mCtxElement.clearRect(0, 0, mSize, mSize);
            // Background & Crosshair
            mCtxElement.beginPath(); mCtxElement.arc(mSize / 2, mSize / 2, mSize / 2 - 2, 0, Math.PI * 2);
            mCtxElement.fillStyle = 'rgba(6,6,10,0.78)'; mCtxElement.fill();
            mCtxElement.strokeStyle = 'rgba(255,255,255,0.08)'; mCtxElement.lineWidth = 1; mCtxElement.stroke();
            // Reticulos
            mCtxElement.beginPath(); mCtxElement.moveTo(mSize / 2, 0); mCtxElement.lineTo(mSize / 2, mSize);
            mCtxElement.moveTo(0, mSize / 2); mCtxElement.lineTo(mSize, mSize / 2);
            mCtxElement.strokeStyle = 'rgba(255,255,255,0.06)'; mCtxElement.stroke();

            let sc = (mSize - 10) / (WORLD_CENTER * 2);
            let offset = 5;
            // Trails for other snakes
            for (let s of act) {
                if (s === player) continue;
                mCtxElement.beginPath();
                mCtxElement.arc(offset + s.x * sc, offset + s.y * sc, 1.3, 0, Math.PI * 2);
                mCtxElement.fillStyle = 'rgba(255,255,255,0.3)';
                mCtxElement.fill();
                // Trail sutil puxando alguns gomos
                if (s.segments.length > 5) {
                    let last = s.segments[Math.min(s.segments.length - 1, 10)];
                    mCtxElement.beginPath();
                    mCtxElement.moveTo(offset + s.x * sc, offset + s.y * sc);
                    mCtxElement.lineTo(offset + last.x * sc, offset + last.y * sc);
                    mCtxElement.strokeStyle = 'rgba(255,255,255,0.1)'; mCtxElement.lineWidth = 1; mCtxElement.stroke();
                }
            }
            // Player Dot: Ultra-Bright Bloom (Ajustável via Qualidade de Sombra)
            mCtxElement.shadowBlur = CONFIG.visual.qualidadeSombra;
            mCtxElement.shadowColor = '#fff';
            mCtxElement.beginPath(); mCtxElement.arc(offset + player.x * sc, offset + player.y * sc, 3.2, 0, Math.PI * 2);
            mCtxElement.fillStyle = '#fff'; mCtxElement.fill();
            mCtxElement.shadowBlur = 0;

            const ep = Math.max(0, player.energy / CONFIG.cobra.energiaMaxima);
            UI.energyFill.style.width = (ep * 100) + '%';
            UI.energyFill.style.background = ep > 0.4 ? 'linear-gradient(90deg, #00ff88, #FFD60A)' : (ep > 0.2 ? '#FFD60A' : '#ff4444');
        }

        function drawGrid(ctx, camX, camY, zoom) {
            ctx.fillStyle = CONFIG.mundo.corFundo; ctx.fillRect(camX - (vpWidth / zoom) / 2, camY - (vpHeight / zoom) / 2, vpWidth / zoom, vpHeight / zoom);
            let grad = ctx.createRadialGradient(WORLD_CENTER, WORLD_CENTER, 0, WORLD_CENTER, WORLD_CENTER, WORLD_CENTER);
            grad.addColorStop(0, 'rgba(255, 255, 255, 0.05)'); grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, WORLD_CENTER * 2, WORLD_CENTER * 2);

            const size = CONFIG.mundo.tamanhoHexagono; const h = size * Math.sqrt(3); const w = size * 1.5;
            let sC = Math.floor((camX - (vpWidth / zoom) / 2) / w) - 1; let eC = Math.ceil((camX + (vpWidth / zoom) / 2) / w) + 1;
            let sR = Math.floor((camY - (vpHeight / zoom) / 2) / h) - 1; let eR = Math.ceil((camY + (vpHeight / zoom) / 2) / h) + 1;

            ctx.beginPath(); ctx.strokeStyle = CONFIG.mundo.corGrade; ctx.lineWidth = 1;
            for (let c = sC; c <= eC; c++) {
                for (let r = sR; r <= eR; r++) {
                    let x = c * w, y = r * h + (c % 2 ? h / 2 : 0);
                    ctx.moveTo(x + size, y); for (let i = 1; i <= 6; i++) ctx.lineTo(x + size * Math.cos(i * Math.PI / 3), y + size * Math.sin(i * Math.PI / 3));
                }
            }
            ctx.stroke();
            ctx.save();
            ctx.beginPath();
            ctx.rect(camX - (vpWidth / zoom) / 2 - 100, camY - (vpHeight / zoom) / 2 - 100, vpWidth / zoom + 200, vpHeight / zoom + 200);
            ctx.arc(WORLD_CENTER, WORLD_CENTER, WORLD_CENTER - 15, 0, Math.PI * 2, true);
            ctx.fillStyle = 'rgba(180, 0, 0, 0.22)';
            ctx.fill('evenodd');
            ctx.restore();
            ctx.beginPath(); ctx.arc(WORLD_CENTER, WORLD_CENTER, WORLD_CENTER, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(255, 0, 0, 0.35)'; ctx.lineWidth = 30; ctx.stroke();
        }

        function gameLoop(time) {
            mainCtx.setTransform(1, 0, 0, 1, 0, 0);
            mainCtx.clearRect(0, 0, gameCanvasElement.width, gameCanvasElement.height);
            mainCtx.scale(dpr, dpr);

            if (gameState === 'menu') {
                mainCtx.fillStyle = CONFIG.mundo.corFundo; mainCtx.fillRect(0, 0, vpWidth, vpHeight);
                for (let ff of fireflies) { ff.update(); ff.draw(mainCtx, time); }
                let grad = mainCtx.createRadialGradient(vpWidth / 2, vpHeight / 2, 0, vpWidth / 2, vpHeight / 2, vpWidth);
                grad.addColorStop(0, 'rgba(255,255,255,0.05)'); grad.addColorStop(1, 'rgba(0,0,0,0.9)');
                mainCtx.fillStyle = grad; mainCtx.fillRect(0, 0, vpWidth, vpHeight);
            }
            else if (gameState === 'skin-menu') {
                mainCtx.fillStyle = '#06060a'; mainCtx.fillRect(0, 0, vpWidth, vpHeight);

                let act = SKINS[skinIndex];
                let rad = IS_MOBILE_CLIENT ? 34 : 48;
                let len = 34; // Gomos extras para melhor visibilidade
                let spc = rad * 0.42;
                let headX = (vpWidth / 2) + (len * spc * 0.4); // Centralizar corpo
                let centerY = vpHeight / 2;

                // Iluminação de Fundo Vibrante
                let skinColor = act[0];
                let bgGlow = mainCtx.createRadialGradient(vpWidth / 2, centerY, 0, vpWidth / 2, centerY, vpWidth * 0.45);
                bgGlow.addColorStop(0, skinColor + '40'); // Mais intenso (40 octetos)
                bgGlow.addColorStop(1, 'rgba(6,6,10,0)');
                mainCtx.fillStyle = bgGlow; mainCtx.fillRect(0, 0, vpWidth, vpHeight);

                let segs = [];
                for (let i = 0; i < len; i++) {
                    segs.push({
                        x: headX - (i * spc),
                        y: centerY + Math.sin(time * 0.005 - i * 0.20) * (rad * 1.8)
                    });
                }

                // Renderização Limpa e Vibrante
                const drawPreviewSegFix = (x, y, r, color) => {
                    mainCtx.beginPath();
                    mainCtx.arc(x, y, r, 0, Math.PI * 2);
                    mainCtx.fillStyle = color;
                    mainCtx.fill();
                    // Luz de Superfície Punchy (não escurece a cor principal)
                    let hl = mainCtx.createRadialGradient(x - r * 0.15, y - r * 0.15, r * 0.05, x, y, r);
                    hl.addColorStop(0, 'rgba(255,255,255,0.45)');
                    hl.addColorStop(0.2, 'rgba(255,255,255,0.12)');
                    hl.addColorStop(1, 'rgba(0,0,0,0)');
                    mainCtx.fillStyle = hl;
                    mainCtx.fill();
                };

                for (let i = segs.length - 1; i >= 0; i--) {
                    drawPreviewSegFix(segs[i].x, segs[i].y, rad, act[i % act.length]);
                }
                let h = segs[0];
                drawPreviewSegFix(h.x, h.y, rad, act[0]);
                drawStandardEyes(mainCtx, h.x, h.y, rad, 0, 0, skinIndex);
            }
            else if (gameState === 'playing' || gameState === 'dead') {
                /*
                 * CORRECAO BUG 4: Verifica energia mínima antes de ativar turbo do jogador.
                 * Antes: player.isBoosting = isMouseDown  (sempre sobrescrevia, mesmo sem energia)
                 * Agora: só ativa se tiver energia acima do mínimo, permitindo a recarga correta.
                 */
                if (player && player.alive) {
                    player.isBoosting = isMouseDown && player.energy > CONFIG.cobra.energiaMinima;
                }

                if (snakes.filter(s => s.alive).length < CONFIG.mundo.quantidadeBots)
                    snakes.push(new Snake(...Object.values(getSafeSpawnPos(1500)), BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)], Math.floor(Math.random() * SKINS.length), false, getRandomBotScore(), getNewGenome()));
                if (foods.length < CONFIG.mundo.quantidadeComida) spawnFood(15);
                for (let s of snakes) s.update();

                /*
                 * CORRECAO BUG 2: Loop de colisão corrigido.
                 * Quando s1 morre na colisão cabeça-a-cabeça, o loop interno deve usar
                 * 'break' (e não 'continue') para parar de verificar segmentos de s2,
                 * evitando que s1 morra múltiplas vezes no mesmo frame.
                 */
                for (let i = 0; i < snakes.length; i++) {
                    let s1 = snakes[i]; if (!s1.alive) continue;
                    for (let j = 0; j < snakes.length; j++) {
                        let s2 = snakes[j]; if (i === j || !s2.alive) continue;
                        let hitDist = (s1.radius * 0.8) + (s2.radius * 0.8);
                        let headDist = Math.hypot(s1.x - s2.x, s1.y - s2.y);
                        if (headDist < hitDist) {
                            if (Math.abs(s1.score - s2.score) < s1.score * 0.1) {
                                if (s2 === player && s1 !== player) { playerKills++; camera.shake = 15; }
                                if (s1 === player && s2 !== player) { playerKills++; camera.shake = 15; }
                                s1.die(true); s2.die(true);
                                break; // CORRIGIDO: era 'continue', agora é 'break'
                            } else if (s1.score < s2.score) {
                                if (s2 === player && s1 !== player) { playerKills++; camera.shake = 15; }
                                s1.die(true);
                                break; // Sai do loop j pois s1 já morreu
                            }
                        }
                        if (!s1.alive) break; // Guarda extra: sai se s1 morreu no check anterior
                        for (let k = 3; k < s2.segments.length; k += 4) {
                            if (Math.hypot(s1.x - s2.segments[k].x, s1.y - s2.segments[k].y) < hitDist) {
                                if (s2 === player && s1 !== player) { playerKills++; camera.shake = 15; }
                                s1.die(true); break;
                            }
                        }
                        if (!s1.alive) break; // Sai do loop j após morte por segmento
                    }
                }

                if (player && player.alive) {
                    camera.x += (player.x - camera.x) * 0.1; camera.y += (player.y - camera.y) * 0.1;
                    let zV = CONFIG.zoom[IS_MOBILE_CLIENT ? 'mobile' : 'pc'];
                    camera.zoom += (Math.max(zV.minimo, zV.inicial - Math.pow(player.score, 0.4) * zV.fatorAfastamento) * (player.isBoosting ? 0.94 : 1) - camera.zoom) * 0.05;
                    let sorted2 = snakes.filter(s => s.alive).sort((a, b) => b.score - a.score);
                    let isTop1Now = sorted2[0] === player;
                    if (isTop1Now && !wasTop1) {
                        wasTop1 = true;
                        soundTop1();
                        createConfetti(vpWidth / 2, vpHeight / 2, 35);
                        UI.top1Banner.classList.add('show');
                        setTimeout(() => UI.top1Banner.classList.remove('show'), 3500);
                    } else if (!isTop1Now) { wasTop1 = false; }
                    if (player.isBoosting && frameCount % 18 === 0) soundBoost();
                }
                snakes = snakes.filter(s => s.alive || s.isPlayer);
                for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].life <= 0) particles.splice(i, 1); }
                for (let i = confetti.length - 1; i >= 0; i--) { let c = confetti[i]; c.x += c.vx; c.y += c.vy; c.vy += 0.25; c.rot += c.rotSpeed; c.life -= c.decay; if (c.life <= 0) confetti.splice(i, 1); }
                for (let ff of fireflies) ff.update();

                let cullingDist = Math.max(vpWidth, vpHeight) / camera.zoom / 2 + CONFIG.visual.dRender;

                mainCtx.save(); mainCtx.translate(vpWidth / 2, vpHeight / 2);
                if (camera.shake > 0.5) { mainCtx.translate(Math.random() * camera.shake - camera.shake / 2, Math.random() * camera.shake - camera.shake / 2); camera.shake *= 0.85; }
                mainCtx.scale(camera.zoom, camera.zoom); mainCtx.translate(-camera.x, -camera.y);

                drawGrid(mainCtx, camera.x, camera.y, camera.zoom);

                for (let ff of fireflies) { if (Math.hypot(ff.x - camera.x, ff.y - camera.y) < cullingDist) ff.draw(mainCtx, time); }
                for (let f of foods) { if (Math.hypot(f.x - camera.x, f.y - camera.y) < cullingDist) f.draw(mainCtx, time); }
                for (let p of particles) { if (Math.hypot(p.x - camera.x, p.y - camera.y) < cullingDist) p.draw(mainCtx); }

                let dL = [...snakes].sort((a, b) => a.score - b.score);
                for (let s of dL) {
                    if (Math.hypot(s.x - camera.x, s.y - camera.y) < cullingDist + (s.targetLength * s.conf.distanciaGomos)) {
                        s.draw(mainCtx);
                    }
                }

                mainCtx.restore();

                for (let c of confetti) {
                    mainCtx.save(); mainCtx.globalAlpha = Math.max(0, c.life);
                    mainCtx.translate(c.x, c.y); mainCtx.rotate(c.rot);
                    mainCtx.fillStyle = c.color;
                    mainCtx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
                    mainCtx.restore();
                }
                mainCtx.globalAlpha = 1;

                if (frameCount % 10 === 0) updateHUD(); frameCount = (frameCount + 1) % 10000;
            }
            requestAnimationFrame(gameLoop);
        }

        /* ── EVENTOS ── */
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mousedown', (e) => { if (e.button === 0) isMouseDown = true; });
        window.addEventListener('mouseup', (e) => { if (e.button === 0) isMouseDown = false; });

        UI.play.addEventListener('click', async () => {
            triggerHaptic('forcaClique');
            await enterFullscreen();
            snakes = []; foods = []; fireflies = []; particles = []; confetti = []; playerKills = 0;
            wasTop1 = false;
            const pSpawn = getSafeSpawnPos(1500);
            player = new Snake(pSpawn.x, pSpawn.y, UI.nick.value.trim() || "LENDA", skinIndex, true, CONFIG.mundo.spawn.jogadorInicial); snakes.push(player);
            for (let i = 0; i < CONFIG.mundo.quantidadeBots; i++) snakes.push(new Snake(...Object.values(getSafeSpawnPos(1500)), BOT_NAMES[i % BOT_NAMES.length], Math.floor(Math.random() * SKINS.length), false, getRandomBotScore(), getNewGenome()));
            spawnFood(CONFIG.mundo.quantidadeComida); for (let i = 0; i < CONFIG.visual.quantidadeVagalumes; i++) fireflies.push(new Firefly());
            gameState = 'playing'; UI.start.style.display = 'none'; UI.death.classList.add('hidden');
            UI.lb.style.display = 'block'; UI.status.style.display = 'flex'; UI.mini.style.display = 'block';
            if (IS_MOBILE_CLIENT) UI.ctrls.style.display = 'block';
        });

        UI.skins.addEventListener('click', () => { triggerHaptic('forcaClique'); gameState = 'skin-menu'; UI.start.style.display = 'none'; UI.preview.classList.remove('hidden'); UI.skinName.innerText = SKIN_NAMES[skinIndex]; });
        UI.ok.addEventListener('click', () => { triggerHaptic('forcaClique'); UI.preview.classList.add('hidden'); UI.start.style.display = 'flex'; gameState = 'menu'; });
        UI.left.addEventListener('click', () => { triggerHaptic('forcaClique'); skinIndex = (skinIndex - 1 + SKINS.length) % SKINS.length; UI.skinName.innerText = SKIN_NAMES[skinIndex]; UI.skinCounter.innerText = `${skinIndex + 1} / ${SKINS.length}`; });
        UI.right.addEventListener('click', () => { triggerHaptic('forcaClique'); skinIndex = (skinIndex + 1) % SKINS.length; UI.skinName.innerText = SKIN_NAMES[skinIndex]; UI.skinCounter.innerText = `${skinIndex + 1} / ${SKINS.length}`; });
        UI.again.addEventListener('click', () => { triggerHaptic('forcaClique'); UI.death.classList.add('hidden'); UI.start.style.display = 'flex'; gameState = 'menu'; });

        /* ── JOYSTICK MULTI-TOUCH ── */
        const JOYSTICK_DEADZONE = 8;
        const JOYSTICK_MAX_RADIUS = 55;
        let joystickTouchId = null;

        function updateJoystick(touch) {
            const r = UI.joyB.getBoundingClientRect(), cX = r.left + r.width / 2, cY = r.top + r.height / 2;
            const dx = touch.clientX - cX, dy = touch.clientY - cY, dist = Math.hypot(dx, dy);
            if (dist > JOYSTICK_DEADZONE) {
                joystickAngle = Math.atan2(dy, dx);
            }
            const capD = Math.min(dist, JOYSTICK_MAX_RADIUS);
            UI.joyH.style.transform = `translate(calc(-50% + ${Math.cos(joystickAngle) * capD}px), calc(-50% + ${Math.sin(joystickAngle) * capD}px))`;
        }

        UI.joyB.addEventListener('touchstart', (e) => {
            e.preventDefault(); e.stopPropagation();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (joystickTouchId === null) {
                    joystickTouchId = e.changedTouches[i].identifier;
                    joystickActive = true;
                    updateJoystick(e.changedTouches[i]);
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (joystickActive) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickTouchId) {
                        updateJoystick(e.changedTouches[i]);
                        e.preventDefault();
                    }
                }
            }
        }, { passive: false });

        function releaseJoystick(e) {
            if (joystickActive) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickTouchId) {
                        joystickActive = false;
                        joystickTouchId = null;
                        UI.joyH.style.transform = 'translate(-50%, -50%)';
                    }
                }
            }
        }

        window.addEventListener('touchend', releaseJoystick);
        window.addEventListener('touchcancel', releaseJoystick);

        UI.boost.addEventListener('touchstart', (e) => {
            isMouseDown = true;
            e.stopPropagation(); e.preventDefault();
        }, { passive: false });

        UI.boost.addEventListener('touchend', (e) => {
            isMouseDown = false;
            e.stopPropagation(); e.preventDefault();
        }, { passive: false });

        UI.boost.addEventListener('touchcancel', (e) => {
            isMouseDown = false;
            e.stopPropagation();
        }, { passive: false });

        /* ── GESTOS (SWIPE) ── */
        let touchStartX = 0, touchStartY = 0, swipeTouchId = null;

        window.addEventListener('touchstart', e => {
            if (e.target.closest('#mobile-controls') || e.target.closest('#ui-layer > div:not(#mobile-controls)')) return;
            if (swipeTouchId === null) {
                swipeTouchId = e.changedTouches[0].identifier;
                touchStartX = e.changedTouches[0].clientX;
                touchStartY = e.changedTouches[0].clientY;
            }
        }, { passive: true });

        window.addEventListener('touchend', e => {
            if (gameState !== 'playing' || !player) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === swipeTouchId) {
                    let dx = e.changedTouches[i].clientX - touchStartX;
                    let dy = e.changedTouches[i].clientY - touchStartY;
                    if (Math.abs(dx) > 45 || Math.abs(dy) > 45) {
                        if (player.score > 25) {
                            player.score -= 15;
                            player.speed = CONFIG.cobra.mobile.velocidadeTurbo * 1.6;
                            createExplosion(player.x, player.y, '#ffdf00', 12);
                            setTimeout(() => { if (player && !player.isBoosting) player.speed = CONFIG.cobra.mobile.velocidadeBase; }, 200);
                        }
                    }
                    swipeTouchId = null;
                }
            }
        });

        /* ── ARRANQUE ── */
        resize();
        spawnFood(10);
        for (let i = 0; i < CONFIG.visual.quantidadeVagalumes; i++) fireflies.push(new Firefly());
        requestAnimationFrame(gameLoop);
    </script>
